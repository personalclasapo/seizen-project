<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 全項目</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-blue-100','text-blue-700','bg-rose-100','text-rose-700',
        'bg-green-100','text-green-700','bg-amber-100','text-amber-700',
        'bg-purple-100','text-purple-700','bg-teal-100','text-teal-700',
        'bg-orange-100','text-orange-700','bg-indigo-100','text-indigo-700',
      ]
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    function allItemsApp() {
      return {
        loading: true,
        error: null,
        allItems: [],
        sortBy: 'group',
        filterGroups: [],
        filterStatuses: [],
        filterStatus: 'all',
        showFilter: false,
        expandedItems: [],
        allExpanded: false,

        availableGroups() {
          const seen = new Set();
          const out = [];
          for (const item of this.allItems) {
            if (!seen.has(item.group)) { seen.add(item.group); out.push(item.group); }
          }
          return out;
        },

        filtered() {
          let items = this.allItems;
          if (this.filterGroups.length > 0) {
            items = items.filter(i => this.filterGroups.includes(i.group));
          }
          if (this.filterStatuses.length > 0) {
            items = items.filter(i => {
              const d = doneCount(i.row);
              if (this.filterStatuses.includes('done') && d === PERSPECTIVES.length) return true;
              if (this.filterStatuses.includes('inProgress') && d > 0 && d < PERSPECTIVES.length) return true;
              if (this.filterStatuses.includes('todo') && d === 0) return true;
              return false;
            });
          }
          if (this.filterStatus !== 'all') {
            items = items.filter(i => {
              const tag = SHEETS[i.sheetKey]?.statusTag?.(i.row) || null;
              if (this.filterStatus === 'active') return !tag || tag.norm === 'active';
              if (this.filterStatus === 'closing') return tag?.norm === 'closing';
              if (this.filterStatus === 'closed') return tag?.norm === 'closed';
              return true;
            });
          }
          return [...items].sort((a, b) => {
            if (this.sortBy === 'name') return a.name.localeCompare(b.name, 'ja');
            if (this.sortBy === 'done') return doneCount(b.row) - doneCount(a.row);
            const gi = x => GROUPS.findIndex(g => g.label === x.group);
            return gi(a) - gi(b) || a.name.localeCompare(b.name, 'ja');
          });
        },

        itemKey(item) {
          return item.sheetKey + '-' + item.row._row;
        },

        isExpanded(item) {
          return this.allExpanded || this.expandedItems.includes(this.itemKey(item));
        },

        toggleExpand(item) {
          const key = this.itemKey(item);
          if (this.allExpanded) {
            this.allExpanded = false;
            this.expandedItems = this.allItems
              .map(i => this.itemKey(i))
              .filter(k => k !== key);
          } else {
            const i = this.expandedItems.indexOf(key);
            if (i >= 0) this.expandedItems.splice(i, 1); else this.expandedItems.push(key);
          }
        },

        async init() {
          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const [results, members] = await Promise.all([
              Promise.allSettled(
                Object.keys(SHEETS).map(key =>
                  getSheet(key).then(rows => ({ key, rows }))
                )
              ),
              getSheet('family_member').catch(() => [])
            ]);
            loadFamilyMembers(members);
            const items = [];
            for (const r of results) {
              if (r.status === 'rejected') continue;
              const { key, rows } = r.value;
              const def = SHEETS[key];
              for (const row of rows) {
                const itemLabel = key === 'cash_flow' ? (row.service_category || def.label) : def.label;
                items.push({ sheetKey: key, group: def.group, label: itemLabel, name: def.name(row), row });
              }
            }
            this.allItems = items;
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        perspectiveStatuses(row) {
          return PERSPECTIVES.map(p => ({
            label: p.label,
            content: row[p.contentCol] || '',
            color: perspectiveColor(row[p.statusCol] || '未確認')
          }));
        },

        itemAmountStr(row) {
          const n = row.monthly_amount || row.billing_amount;
          if (!n) return '';
          const num = Number(n).toLocaleString();
          const cycle = formatCycle(row);
          return cycle ? `¥${num}/${cycle}` : `¥${num}`;
        },

        itemHolder(item) {
          return SHEETS[item.sheetKey]?.holder?.(item.row) || '';
        },

        itemHolders(item) {
          return SHEETS[item.sheetKey]?.holders?.(item.row) || [];
        },

        shouldCollapseHolders(holders) {
          const unique = [...new Set(holders.map(h => h.name).filter(Boolean))];
          return unique.length >= 2;
        },

        expandedHolderKeys: [],

        toggleHolderExpand(key, e) {
          e.stopPropagation();
          const i = this.expandedHolderKeys.indexOf(key);
          if (i >= 0) this.expandedHolderKeys.splice(i, 1); else this.expandedHolderKeys.push(key);
        },

        isHolderExpanded(key) {
          return this.expandedHolderKeys.includes(key);
        },

        isCashFlowItem(item) {
          return item.sheetKey === 'cash_flow';
        },

        itemEstimatedAmountStr(item) {
          return SHEETS[item.sheetKey]?.estimatedAmount?.(item.row) || '';
        },

        itemSubType(item) {
          return SHEETS[item.sheetKey]?.subType?.(item.row) || '';
        },

        isNegativeAmount(item) {
          const v = item.row.estimated_amount;
          return v !== undefined && v !== '' && Number(v) < 0;
        },

        itemStatusTag(item) {
          return SHEETS[item.sheetKey]?.statusTag?.(item.row) || null;
        },

        goDetail(item) {
          location.href = `item-detail.html?sheet=${item.sheetKey}&row=${item.row._row}`;
        },

        toggleGroup(g) {
          const i = this.filterGroups.indexOf(g);
          if (i >= 0) this.filterGroups.splice(i, 1); else this.filterGroups.push(g);
        },

        toggleStatus(s) {
          const i = this.filterStatuses.indexOf(s);
          if (i >= 0) this.filterStatuses.splice(i, 1); else this.filterStatuses.push(s);
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="allItemsApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10">
      <p class="font-medium">全項目</p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4 space-y-3">

      <!-- Filter & View bar -->
      <div class="flex items-center gap-1.5 pt-2">
        <button @click="showFilter = !showFilter"
          :class="filterGroups.length + filterStatuses.length + (filterStatus !== 'all' ? 1 : 0) > 0 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium flex items-center gap-1.5">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18M7 9h10M11 14h2"/>
          </svg>
          絞込
          <span x-show="filterGroups.length + filterStatuses.length + (filterStatus !== 'all' ? 1 : 0) > 0"
                class="bg-blue-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-xs"
                x-text="filterGroups.length + filterStatuses.length + (filterStatus !== 'all' ? 1 : 0)"></span>
        </button>
        <button @click="allExpanded = false; expandedItems = []"
          :class="!allExpanded ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">簡易</button>
        <button @click="allExpanded = true"
          :class="allExpanded ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">詳細</button>
        <a href="add-item.html"
          class="ml-auto flex items-center gap-1 px-3 py-1.5 text-xs bg-white border border-blue-300 text-blue-600 rounded-lg font-medium hover:bg-blue-50 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          新規登録
        </a>
      </div>

      <!-- Filter panel -->
      <div x-show="showFilter" class="bg-white rounded-xl p-4 shadow-sm space-y-3">
        <div>
          <p class="text-xs text-gray-500 mb-2">グループ</p>
          <div class="flex flex-wrap gap-2">
            <template x-for="g in availableGroups()" :key="g">
              <button @click="toggleGroup(g)"
                :class="filterGroups.includes(g) ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg" x-text="g"></button>
            </template>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-2">ステータス</p>
          <div class="flex gap-2">
            <button @click="toggleStatus('done')"
              :class="filterStatuses.includes('done') ? 'bg-green-50 text-green-700 border-green-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">完了</button>
            <button @click="toggleStatus('inProgress')"
              :class="filterStatuses.includes('inProgress') ? 'bg-yellow-50 text-yellow-700 border-yellow-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">進行中</button>
            <button @click="toggleStatus('todo')"
              :class="filterStatuses.includes('todo') ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">TODO</button>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-2">状態</p>
          <div class="flex gap-2 flex-wrap">
            <button @click="filterStatus = 'all'"
              :class="filterStatus === 'all' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">すべて</button>
            <button @click="filterStatus = 'active'"
              :class="filterStatus === 'active' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">継続中</button>
            <button @click="filterStatus = 'closing'"
              :class="filterStatus === 'closing' ? 'bg-amber-50 text-amber-700 border-amber-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">解約予定</button>
            <button @click="filterStatus = 'closed'"
              :class="filterStatus === 'closed' ? 'bg-gray-200 text-gray-600 border-gray-400' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">解約済</button>
          </div>
        </div>
        <div class="flex items-center justify-between pt-1">
          <button @click="filterGroups = []; filterStatuses = []; filterStatus = 'all'"
            class="text-xs text-gray-400 hover:text-gray-600">クリア</button>
          <button @click="showFilter = false"
            class="text-xs font-medium text-blue-600 hover:text-blue-800 px-3 py-1.5 rounded-lg hover:bg-blue-50">閉じる</button>
        </div>
      </div>

      <!-- Item count -->
      <p class="text-xs text-gray-400" x-text="filtered().length + '件'"></p>

      <!-- Item list -->
      <div class="space-y-2">
        <template x-for="item in filtered()" :key="item.sheetKey + '-' + item.row._row">
          <div class="bg-white rounded-xl shadow-sm overflow-hidden flex"
               :class="itemStatusTag(item)?.muted ? 'opacity-60' : ''">

            <!-- カード本体：詳細ページへ -->
            <div @click="goDetail(item)"
                 class="flex-1 px-4 py-3 cursor-pointer hover:bg-gray-50 transition-colors min-w-0">
              <!-- 1行目：項目名 + 状態タグ + 右列（進捗＋契約者） -->
              <div class="flex items-start gap-2 mb-1">
                <div class="flex-1 min-w-0">
                  <span class="font-medium leading-snug" x-text="item.name"></span>
                  <template x-if="itemStatusTag(item)">
                    <span :class="itemStatusTag(item).bg + ' ' + itemStatusTag(item).text"
                          class="text-xs px-1.5 py-0.5 rounded font-medium whitespace-nowrap ml-1.5"
                          x-text="itemStatusTag(item).label"></span>
                  </template>
                </div>
                <div class="shrink-0 flex flex-col items-end gap-0.5 pl-1">
                  <template x-if="itemHolders(item).length > 0">
                    <div class="flex flex-col items-end gap-0.5"
                         @click.stop="shouldCollapseHolders(itemHolders(item)) && toggleHolderExpand(itemKey(item), $event)"
                         :class="shouldCollapseHolders(itemHolders(item)) ? 'cursor-pointer' : ''">
                      <template x-if="isHolderExpanded(itemKey(item))">
                        <div class="flex flex-col items-end gap-0.5">
                          <template x-for="(h, idx) in itemHolders(item)" :key="h.role">
                            <div class="flex items-center gap-1">
                              <svg x-show="idx === 0"
                                   class="w-3.5 h-3.5 text-gray-400 shrink-0 rotate-180"
                                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                              </svg>
                              <span x-show="idx !== 0" class="w-3.5 shrink-0"></span>
                              <span class="text-xs text-gray-400 whitespace-nowrap" x-text="h.role + '：'"></span>
                              <span :class="holderColor(h.name).bg + ' ' + holderColor(h.name).text"
                                    class="text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap"
                                    x-text="h.name"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                      <template x-if="!isHolderExpanded(itemKey(item))">
                        <div class="flex items-center gap-1">
                          <svg x-show="shouldCollapseHolders(itemHolders(item))"
                               class="w-3.5 h-3.5 text-gray-400 shrink-0"
                               fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                          </svg>
                          <span class="text-xs text-gray-400 whitespace-nowrap" x-text="itemHolders(item)[0].role + '：'"></span>
                          <span :class="holderColor(itemHolders(item)[0].name).bg + ' ' + holderColor(itemHolders(item)[0].name).text"
                                class="text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap"
                                x-text="itemHolders(item)[0].name"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
              <!-- 2行目：タイプ + 金額/概算額 + プラン/種別補足 -->
              <div class="flex items-center gap-1.5 flex-wrap">
                <span x-show="item.label" class="text-xs text-gray-400 bg-gray-100 rounded px-1.5 py-0.5 shrink-0" x-text="item.label"></span>
                <template x-if="isCashFlowItem(item)">
                  <span x-show="itemAmountStr(item.row)"
                        class="text-xs font-medium text-gray-600 shrink-0"
                        x-text="itemAmountStr(item.row)"></span>
                </template>
                <template x-if="isCashFlowItem(item)">
                  <span x-show="item.row.plan"
                        class="text-xs text-gray-500 shrink-0"
                        x-text="item.row.plan"></span>
                </template>
                <template x-if="!isCashFlowItem(item)">
                  <span x-show="itemEstimatedAmountStr(item)"
                        :class="isNegativeAmount(item) ? 'text-xs font-medium text-red-500 shrink-0' : 'text-xs font-medium text-gray-600 shrink-0'"
                        x-text="itemEstimatedAmountStr(item)"></span>
                </template>
                <template x-if="!isCashFlowItem(item)">
                  <span x-show="itemSubType(item)"
                        class="text-xs text-gray-500 shrink-0"
                        x-text="itemSubType(item)"></span>
                </template>
              </div>
              <div class="flex justify-end mt-0.5">
                <span class="text-xs text-gray-400" x-text="doneCount(item.row) + '/3'"></span>
              </div>
              <!-- 展開時：観点の中身 -->
              <div x-show="isExpanded(item)" class="mt-3 space-y-2">
                <template x-for="ps in perspectiveStatuses(item.row)" :key="ps.label">
                  <div :class="ps.color.bg" class="rounded-lg p-3">
                    <div class="flex items-center justify-between mb-1">
                      <span :class="ps.color.text" class="text-xs font-medium" x-text="ps.label"></span>
                      <span :class="ps.color.text" class="text-xs font-bold" x-text="ps.color.icon"></span>
                    </div>
                    <p :class="ps.content ? ps.color.text : 'text-gray-400'"
                       class="text-xs leading-relaxed whitespace-pre-wrap"
                       x-text="ps.content || '（未入力）'"></p>
                  </div>
                </template>
              </div>
            </div>

            <!-- 展開/折り畳みエリア：右端 縦仕切り -->
            <div @click.stop="toggleExpand(item)"
                 class="w-11 shrink-0 border-l border-gray-100 flex items-start justify-center pt-3 cursor-pointer hover:bg-gray-50 transition-colors select-none">
              <svg class="w-4 h-4 text-gray-400 transition-transform duration-200"
                   :class="isExpanded(item) ? 'rotate-180' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>

          </div>
        </template>

        <div x-show="filtered().length === 0" class="text-center py-16 text-gray-400 text-sm">
          該当する項目がありません
        </div>
      </div>

    </div>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs mt-0.5">ホーム</span>
      </a>
      <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-blue-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        <span class="text-xs mt-0.5">全項目</span>
      </a>
      <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs mt-0.5">設定</span>
      </a>
    </nav>

  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
