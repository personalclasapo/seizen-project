<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 項目一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    function itemListApp() {
      return {
        loading: true,
        error: null,
        sheetKey: '',
        sheetDef: null,
        items: [],
        detailView: false,

        async init() {
          const params = new URLSearchParams(location.search);
          this.sheetKey = params.get('sheet') || 'cash_flow';
          this.sheetDef = SHEETS[this.sheetKey];
          if (!this.sheetDef) {
            this.error = '不正なシートキーです: ' + this.sheetKey;
            this.loading = false;
            return;
          }

          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            this.items = await getSheet(this.sheetKey);
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        itemName(row) {
          return this.sheetDef.name(row);
        },

        itemSub(row) {
          return this.sheetDef.sub(row);
        },

        itemAmountNum(row) {
          const n = row.monthly_amount || row.billing_amount;
          return n ? Number(n).toLocaleString() : '';
        },

        itemAmountCycle(row) {
          if (row.monthly_amount) return '月';
          if (row.billing_amount && row.billing_cycle) return row.billing_cycle;
          return '';
        },

        itemHolder(row) {
          return this.sheetDef.holder?.(row) || '';
        },

        itemPlan(row) {
          return row.plan || '';
        },

        perspectiveStatuses(row) {
          return PERSPECTIVES.map(p => ({
            label: p.label,
            status: row[p.statusCol] || '未確認',
            content: row[p.contentCol] || '',
            color: perspectiveColor(row[p.statusCol] || '未確認')
          }));
        },

        goDetail(row) {
          location.href = `item-detail.html?sheet=${this.sheetKey}&row=${row._row}`;
        }
      };
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div x-data="itemListApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a href="dashboard.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1" x-text="sheetDef?.label || ''"></p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4">

      <!-- ヘッダー -->
      <div class="flex items-center justify-between mb-4 pt-2">
        <div>
          <p class="text-sm text-gray-500" x-text="sheetDef?.group || ''"></p>
          <p class="text-lg font-medium" x-text="sheetDef?.label || ''"></p>
        </div>
        <span class="text-sm text-gray-400"
              x-text="items.length + '件'"></span>
      </div>

      <!-- 表示切替 -->
      <div class="flex gap-2 mb-4">
        <button
          @click="detailView = false"
          :class="!detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          簡易表示
        </button>
        <button
          @click="detailView = true"
          :class="detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          詳細表示
        </button>
      </div>

      <!-- 空状態 -->
      <div x-show="items.length === 0" class="text-center py-16 text-gray-400 text-sm">
        <p class="mb-1">まだ項目がありません</p>
        <p class="text-xs">スプレッドシートにデータを追加してください</p>
      </div>

      <!-- 項目リスト -->
      <div class="space-y-3">
        <template x-for="row in items" :key="row._row">

          <!-- 簡易表示 -->
          <div x-show="!detailView"
               @click="goDetail(row)"
               class="bg-white rounded-xl p-4 shadow-sm cursor-pointer hover:shadow-md transition-shadow">
            <!-- 1行目：項目名 + 契約者 + 進捗 -->
            <div class="flex items-center justify-between mb-1">
              <p class="font-medium truncate flex-1 min-w-0" x-text="itemName(row)"></p>
              <div class="flex items-center gap-2 ml-2 shrink-0">
                <template x-if="itemHolder(row)">
                  <span :class="holderColor(itemHolder(row)).bg + ' ' + holderColor(itemHolder(row)).text"
                        class="text-xs px-2 py-0.5 rounded-full font-medium"
                        x-text="itemHolder(row)"></span>
                </template>
                <span class="text-xs text-gray-400" x-text="doneCount(row) + '/4'"></span>
              </div>
            </div>
            <!-- 2行目：金額 + プラン（ある場合のみ） -->
            <div x-show="itemAmountNum(row) || itemPlan(row)" class="flex items-baseline gap-1 mb-3">
              <span x-show="itemAmountNum(row)" class="text-xs text-gray-400">¥</span>
              <span x-show="itemAmountNum(row)" class="text-base font-bold text-gray-800" x-text="itemAmountNum(row)"></span>
              <span x-show="itemAmountCycle(row)" class="text-xs text-gray-400" x-text="'/' + itemAmountCycle(row)"></span>
              <span x-show="itemPlan(row)" class="text-xs text-gray-400 mx-0.5">・</span>
              <span x-show="itemPlan(row)" class="text-base font-bold text-gray-800 truncate" x-text="itemPlan(row)"></span>
            </div>
            <!-- 金額なしの場合のスペーサー -->
            <div x-show="!itemAmountNum(row) && !itemPlan(row)" class="mb-3"></div>
            <div class="grid grid-cols-4 gap-1.5">
              <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                <div :class="ps.color.bg + ' ' + ps.color.text"
                     class="rounded p-1.5 text-center">
                  <div class="text-xs mb-0.5" x-text="ps.label"></div>
                  <div class="text-xs font-medium" x-text="ps.color.icon"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- 詳細表示 -->
          <div x-show="detailView"
               @click="goDetail(row)"
               class="bg-white rounded-xl p-4 shadow-sm cursor-pointer hover:shadow-md transition-shadow">
            <!-- 1行目：項目名 + 契約者 + 進捗 -->
            <div class="flex items-center justify-between mb-1">
              <p class="font-medium truncate flex-1 min-w-0" x-text="itemName(row)"></p>
              <div class="flex items-center gap-2 ml-2 shrink-0">
                <template x-if="itemHolder(row)">
                  <span :class="holderColor(itemHolder(row)).bg + ' ' + holderColor(itemHolder(row)).text"
                        class="text-xs px-2 py-0.5 rounded-full font-medium"
                        x-text="itemHolder(row)"></span>
                </template>
                <span class="text-xs text-gray-400" x-text="doneCount(row) + '/4'"></span>
              </div>
            </div>
            <!-- 2行目：金額 + プラン（ある場合のみ） -->
            <div x-show="itemAmountNum(row) || itemPlan(row)" class="flex items-baseline gap-1 mb-3">
              <span x-show="itemAmountNum(row)" class="text-xs text-gray-400">¥</span>
              <span x-show="itemAmountNum(row)" class="text-base font-bold text-gray-800" x-text="itemAmountNum(row)"></span>
              <span x-show="itemAmountCycle(row)" class="text-xs text-gray-400" x-text="'/' + itemAmountCycle(row)"></span>
              <span x-show="itemPlan(row)" class="text-xs text-gray-400 mx-0.5">・</span>
              <span x-show="itemPlan(row)" class="text-base font-bold text-gray-800 truncate" x-text="itemPlan(row)"></span>
            </div>
            <!-- 金額なしの場合のスペーサー -->
            <div x-show="!itemAmountNum(row) && !itemPlan(row)" class="mb-3"></div>
            <div class="grid grid-cols-2 gap-2">
              <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                <div :class="ps.color.bg" class="rounded-lg p-3">
                  <div class="flex items-center justify-between mb-1">
                    <span :class="ps.color.text" class="text-xs font-medium" x-text="ps.label"></span>
                    <span :class="ps.color.text" class="text-xs" x-text="ps.color.icon"></span>
                  </div>
                  <p :class="ps.color.text"
                     class="text-xs leading-relaxed"
                     x-text="ps.content || ps.status"></p>
                </div>
              </template>
            </div>
          </div>

        </template>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
