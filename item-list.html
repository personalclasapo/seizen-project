<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 項目一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-blue-100','text-blue-700','bg-rose-100','text-rose-700',
        'bg-green-100','text-green-700','bg-amber-100','text-amber-700',
        'bg-purple-100','text-purple-700','bg-teal-100','text-teal-700',
        'bg-orange-100','text-orange-700','bg-indigo-100','text-indigo-700',
      ]
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    function itemListApp() {
      return {
        loading: true,
        error: null,
        sheetKey: '',
        sheetDef: null,
        groupLabel: '',
        groupSheets: [],
        items: [],
        detailView: false,
        filterProgress: [],
        filterHolders: [],
        filterStatus: 'all',
        filterSheet: '',
        showFilter: false,

        activeFilterCount() {
          const hasStatusFilter = this.groupSheets.every(k => SHEETS[k]?.group !== 'もしもの時');
          return this.filterProgress.length +
            this.filterHolders.length +
            (hasStatusFilter && this.filterStatus !== 'all' ? 1 : 0) +
            (this.filterSheet ? 1 : 0);
        },

        availableHolders() {
          const seen = new Set();
          const out = [];
          for (const r of this.items) {
            for (const h of (SHEETS[r._sheetKey]?.holders?.(r) || [])) {
              if (h.name && !seen.has(h.name)) { seen.add(h.name); out.push(h.name); }
            }
          }
          return out;
        },

        filtered() {
          let rows = this.items;
          if (this.filterSheet) {
            rows = rows.filter(r => r._sheetKey === this.filterSheet);
          }
          if (this.filterProgress.length > 0) {
            rows = rows.filter(r => {
              const d = doneCount(r, r._sheetKey);
              const max = perspectiveMax(r._sheetKey);
              if (this.filterProgress.includes('done') && d === max) return true;
              if (this.filterProgress.includes('inProgress') && d < max) return true;
              return false;
            });
          }
          if (this.filterHolders.length > 0) {
            rows = rows.filter(r => {
              const names = (SHEETS[r._sheetKey]?.holders?.(r) || []).map(h => h.name);
              return names.some(n => this.filterHolders.includes(n));
            });
          }
          if (this.filterStatus !== 'all') {
            rows = rows.filter(r => {
              const tag = SHEETS[r._sheetKey]?.statusTag?.(r) || null;
              if (this.filterStatus === 'active') return !tag || tag.norm === 'active';
              if (this.filterStatus === 'closing') return tag?.norm === 'closing';
              if (this.filterStatus === 'closed') return tag?.norm === 'closed';
              return true;
            });
          }
          return rows;
        },

        toggleProgress(s) {
          const i = this.filterProgress.indexOf(s);
          if (i >= 0) this.filterProgress.splice(i, 1); else this.filterProgress.push(s);
        },

        toggleHolder(name) {
          const i = this.filterHolders.indexOf(name);
          if (i >= 0) this.filterHolders.splice(i, 1); else this.filterHolders.push(name);
        },

        async init() {
          const params = new URLSearchParams(location.search);
          const groupParam = params.get('group');
          const sheetParam = params.get('sheet');

          if (groupParam) {
            const grp = GROUPS.find(g => g.label === groupParam);
            this.groupSheets = grp ? grp.sheets : [];
            this.groupLabel = groupParam;
            this.sheetKey = this.groupSheets[0] || '';
          } else {
            this.sheetKey = sheetParam || 'cash_flow';
            this.groupSheets = [this.sheetKey];
            this.groupLabel = '';
          }

          this.sheetDef = SHEETS[this.sheetKey];
          if (!this.sheetDef) {
            this.error = '不正なシートキーです: ' + this.sheetKey;
            this.loading = false;
            return;
          }

          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const members = await getSheet('family_member').catch(() => []);
            loadFamilyMembers(members);
            const results = await Promise.all(
              this.groupSheets.map(key =>
                getSheet(key)
                  .then(rows => rows.map(r => ({ ...r, _sheetKey: key, _uid: `${key}_${r._row}` })))
                  .catch(() => [])
              )
            );
            this.items = results.flat();
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        itemName(row) {
          return SHEETS[row._sheetKey]?.name(row) || '';
        },

        itemStatusTag(row) {
          return SHEETS[row._sheetKey]?.statusTag?.(row) || null;
        },

        itemSub(row) {
          return SHEETS[row._sheetKey]?.sub(row) || '';
        },

        itemSheetLabel(row) {
          return SHEETS[row._sheetKey]?.label || '';
        },

        itemAmountNum(row) {
          const n = row.monthly_amount || row.billing_amount;
          return n ? Number(n).toLocaleString() : '';
        },

        itemAmountCycle(row) {
          return formatCycle(row);
        },

        itemHolder(row) {
          return SHEETS[row._sheetKey]?.holder?.(row) || '';
        },

        itemHolders(row) {
          return SHEETS[row._sheetKey]?.holders?.(row) || [];
        },

        itemCategoryTag(row) {
          if (row._sheetKey === 'cash_flow') return row.service_category || '';
          const def = SHEETS[row._sheetKey];
          if (def?.headerTag) return def.headerTag(row);
          return def?.label || '';
        },

        itemEstimatedAmount(row) {
          return SHEETS[row._sheetKey]?.estimatedAmount?.(row) || '';
        },

        itemSubType(row) {
          return SHEETS[row._sheetKey]?.subType?.(row) || '';
        },

        isCashFlow(row) {
          return row._sheetKey === 'cash_flow';
        },

        isNegativeAmount(row) {
          const v = row.estimated_amount;
          return v !== undefined && v !== '' && Number(v) < 0;
        },

        shouldCollapseHolders(holders) {
          const unique = [...new Set(holders.map(h => h.name).filter(Boolean))];
          return unique.length >= 2;
        },

        expandedHolderRows: [],

        toggleHolderExpand(uid, e) {
          e.stopPropagation();
          const i = this.expandedHolderRows.indexOf(uid);
          if (i >= 0) this.expandedHolderRows.splice(i, 1); else this.expandedHolderRows.push(uid);
        },

        isHolderExpanded(uid) {
          return this.expandedHolderRows.includes(uid);
        },

        itemPlan(row) {
          return row.plan || '';
        },

        perspectiveStatuses(row) {
          return PERSPECTIVES.map(p => ({
            label: p.label,
            status: row[p.statusCol] || '未確認',
            content: row[p.contentCol] || '',
            color: perspectiveColor(row[p.statusCol] || '未確認')
          }));
        },

        expandedRows: [],

        toggleExpand(uid) {
          if (this.detailView) {
            this.detailView = false;
            this.expandedRows = this.items.map(r => r._uid).filter(id => id !== uid);
          } else {
            const i = this.expandedRows.indexOf(uid);
            if (i >= 0) this.expandedRows.splice(i, 1); else this.expandedRows.push(uid);
          }
        },

        isExpanded(uid) {
          return this.detailView || this.expandedRows.includes(uid);
        },

        async toggleSingleStatus(row) {
          const next = row.q1_existence_status === '完了' ? '未確認' : '完了';
          row._saving = true;
          try {
            const updated = { ...row, q1_existence_status: next };
            await saveRow(row._sheetKey, row._row, updated, getAllCols(row._sheetKey));
            row.q1_existence_status = next;
          } catch (e) {
            alert('保存に失敗しました: ' + e.message);
          }
          row._saving = false;
        },

        goDetail(row) {
          location.href = `item-detail.html?sheet=${row._sheetKey}&row=${row._row}`;
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="itemListApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a href="dashboard.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1" x-text="groupLabel || sheetDef?.group || ''"></p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4">

      <!-- ヘッダー -->
      <div class="flex items-center justify-between mb-4 pt-2">
        <div>
          <p class="text-lg font-medium" x-text="groupLabel || sheetDef?.group || ''"></p>
        </div>
        <span class="text-sm text-gray-400"
              x-text="filtered().length + '件'"></span>
      </div>

      <!-- 絞込・表示切替 -->
      <div class="flex items-center gap-1.5 mb-4">
        <button @click="showFilter = !showFilter"
          :class="activeFilterCount() > 0 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium flex items-center gap-1.5">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18M7 9h10M11 14h2"/>
          </svg>
          絞込
          <span x-show="activeFilterCount() > 0"
                class="bg-blue-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-xs"
                x-text="activeFilterCount()"></span>
        </button>
        <button
          @click="detailView = false; expandedRows = []"
          :class="!detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          簡易
        </button>
        <button
          @click="detailView = true"
          :class="detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          詳細
        </button>
        <a :href="'add-item.html?group=' + encodeURIComponent(sheetDef.group)"
          class="ml-auto flex items-center gap-1 px-3 py-1.5 text-xs bg-white border border-blue-300 text-blue-600 rounded-lg font-medium hover:bg-blue-50 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          新規登録
        </a>
      </div>

      <!-- Filter panel -->
      <div x-show="showFilter" class="bg-white rounded-xl p-4 shadow-sm space-y-3 mb-4">
        <!-- 種別フィルター（複数シートのグループのみ表示） -->
        <template x-if="groupSheets.length > 1">
          <div>
            <p class="text-xs text-gray-500 mb-2">種別</p>
            <div class="flex gap-2 flex-wrap">
              <button @click="filterSheet = ''"
                :class="filterSheet === '' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg">すべて</button>
              <template x-for="key in groupSheets" :key="key">
                <button @click="filterSheet = key"
                  :class="filterSheet === key ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                  class="px-3 py-1 text-xs border rounded-lg"
                  x-text="SHEETS[key]?.label || key"></button>
              </template>
            </div>
          </div>
        </template>
        <div>
          <p class="text-xs text-gray-500 mb-2">進捗</p>
          <div class="flex gap-2">
            <button @click="toggleProgress('done')"
              :class="filterProgress.includes('done') ? 'bg-green-50 text-green-700 border-green-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">完了</button>
            <button @click="toggleProgress('inProgress')"
              :class="filterProgress.includes('inProgress') ? 'bg-yellow-50 text-yellow-700 border-yellow-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">進行中</button>
          </div>
        </div>
        <template x-if="availableHolders().length > 0">
          <div>
            <p class="text-xs text-gray-500 mb-2">対象者</p>
            <div class="flex gap-2 flex-wrap">
              <template x-for="name in availableHolders()" :key="name">
                <button @click="toggleHolder(name)"
                  :class="filterHolders.includes(name) ? holderColor(name).bg + ' ' + holderColor(name).text + ' border-current' : 'bg-gray-50 text-gray-600 border-gray-200'"
                  class="px-3 py-1 text-xs border rounded-lg" x-text="name"></button>
              </template>
            </div>
          </div>
        </template>
        <template x-if="groupSheets.every(k => SHEETS[k]?.group !== 'もしもの時')">
          <div>
            <p class="text-xs text-gray-500 mb-2">状態</p>
            <div class="flex gap-2 flex-wrap">
              <button @click="filterStatus = 'all'"
                :class="filterStatus === 'all' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg">すべて</button>
              <button @click="filterStatus = 'active'"
                :class="filterStatus === 'active' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg">継続中</button>
              <button @click="filterStatus = 'closing'"
                :class="filterStatus === 'closing' ? 'bg-amber-50 text-amber-700 border-amber-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg">解約予定</button>
              <button @click="filterStatus = 'closed'"
                :class="filterStatus === 'closed' ? 'bg-gray-200 text-gray-600 border-gray-400' : 'bg-gray-50 text-gray-600 border-gray-200'"
                class="px-3 py-1 text-xs border rounded-lg">解約済</button>
            </div>
          </div>
        </template>
        <div class="flex items-center justify-between pt-1">
          <button @click="filterProgress = []; filterHolders = []; filterStatus = 'all'; filterSheet = ''"
            class="text-xs text-gray-400 hover:text-gray-600">クリア</button>
          <button @click="showFilter = false"
            class="text-xs font-medium text-blue-600 hover:text-blue-800 px-3 py-1.5 rounded-lg hover:bg-blue-50">閉じる</button>
        </div>
      </div>

      <!-- 空状態 -->
      <div x-show="filtered().length === 0" class="text-center py-16 text-gray-400 text-sm">
        <p class="mb-1" x-text="items.length === 0 ? 'まだ項目がありません' : '該当する項目がありません'"></p>
        <p x-show="items.length === 0" class="text-xs">スプレッドシートにデータを追加してください</p>
      </div>

      <!-- 項目リスト -->
      <div class="space-y-3">
        <template x-for="row in filtered()" :key="row._uid">
          <div class="bg-white rounded-xl shadow-sm overflow-hidden"
               :class="itemStatusTag(row)?.muted ? 'opacity-60' : ''">

            <!-- 上部ゾーン：項目情報 → 詳細ページへ -->
            <div @click="goDetail(row)"
                 class="px-4 pt-4 pb-3 cursor-pointer hover:bg-gray-50 transition-colors">
              <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-1.5 flex-1 min-w-0">
                  <p class="font-medium truncate" x-text="itemName(row)"></p>
                  <template x-if="itemStatusTag(row)">
                    <span :class="itemStatusTag(row).bg + ' ' + itemStatusTag(row).text"
                          class="text-xs px-1.5 py-0.5 rounded font-medium shrink-0 whitespace-nowrap"
                          x-text="itemStatusTag(row).label"></span>
                  </template>
                </div>
                <div class="flex flex-col items-end gap-0.5 ml-2 shrink-0">
                  <template x-if="itemHolders(row).length > 0">
                    <div class="flex flex-col items-end gap-0.5"
                         @click.stop="shouldCollapseHolders(itemHolders(row)) && toggleHolderExpand(row._uid, $event)"
                         :class="shouldCollapseHolders(itemHolders(row)) ? 'cursor-pointer' : ''">
                      <!-- 展開時：全員縦リスト -->
                      <template x-if="isHolderExpanded(row._uid)">
                        <div class="flex flex-col items-end gap-0.5">
                          <template x-for="(h, idx) in itemHolders(row)" :key="h.role">
                            <div class="flex items-center gap-1">
                              <svg x-show="idx === 0"
                                   class="w-3.5 h-3.5 text-gray-400 shrink-0 rotate-180"
                                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                              </svg>
                              <span x-show="idx !== 0" class="w-3.5 shrink-0"></span>
                              <span class="text-xs text-gray-400 whitespace-nowrap" x-text="h.role + '：'"></span>
                              <span :class="holderColor(h.name).bg + ' ' + holderColor(h.name).text"
                                    class="text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap"
                                    x-text="h.name"></span>
                            </div>
                          </template>
                        </div>
                      </template>
                      <!-- 折り畳み時：代表のみ -->
                      <template x-if="!isHolderExpanded(row._uid)">
                        <div class="flex items-center gap-1">
                          <svg x-show="shouldCollapseHolders(itemHolders(row))"
                               class="w-3.5 h-3.5 text-gray-400 shrink-0"
                               fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                          </svg>
                          <span class="text-xs text-gray-400 whitespace-nowrap" x-text="itemHolders(row)[0].role + '：'"></span>
                          <span :class="holderColor(itemHolders(row)[0].name).bg + ' ' + holderColor(itemHolders(row)[0].name).text"
                                class="text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap"
                                x-text="itemHolders(row)[0].name"></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <template x-if="itemCategoryTag(row)">
                  <span class="text-xs text-gray-500 bg-gray-100 rounded px-1.5 py-0.5 shrink-0"
                        x-text="itemCategoryTag(row)"></span>
                </template>
                <template x-if="isCashFlow(row)">
                  <div x-show="itemAmountNum(row) || itemPlan(row)" class="flex items-baseline gap-1">
                    <span x-show="itemAmountNum(row)" class="text-xs text-gray-400">¥</span>
                    <span x-show="itemAmountNum(row)" class="text-base font-bold text-gray-800" x-text="itemAmountNum(row)"></span>
                    <span x-show="itemAmountCycle(row)" class="text-xs text-gray-400" x-text="'/' + itemAmountCycle(row)"></span>
                    <span x-show="itemPlan(row)" class="text-xs text-gray-400 mx-0.5">・</span>
                    <span x-show="itemPlan(row)" class="text-sm font-bold text-gray-800 truncate" x-text="itemPlan(row)"></span>
                  </div>
                </template>
                <template x-if="!isCashFlow(row)">
                  <div x-show="itemEstimatedAmount(row) || itemSubType(row)" class="flex items-baseline gap-1">
                    <span x-show="itemEstimatedAmount(row)"
                          :class="isNegativeAmount(row) ? 'text-base font-bold text-red-500' : 'text-base font-bold text-gray-800'"
                          x-text="itemEstimatedAmount(row)"></span>
                    <span x-show="itemEstimatedAmount(row) && itemSubType(row)" class="text-xs text-gray-400">・</span>
                    <span x-show="itemSubType(row)" class="text-sm text-gray-400" x-text="itemSubType(row)"></span>
                  </div>
                </template>
              </div>
            </div>

            <!-- 下部ゾーン：観点 or メモ → 展開/折り畳み -->
            <div @click="toggleExpand(row._uid)"
                 class="cursor-pointer hover:bg-gray-50 transition-colors select-none">
              <!-- 区切り線 + chevron + 進捗 -->
              <div class="flex items-center px-4 py-1.5">
                <div class="flex-1 border-t border-dashed border-gray-300"></div>
                <div class="mx-2">
                  <svg class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200"
                       :class="isExpanded(row._uid) ? 'rotate-180' : ''"
                       fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </div>
                <div class="flex-1 border-t border-dashed border-gray-300"></div>
                <template x-if="!SHEETS[row._sheetKey]?.noPerspectives">
                  <span class="text-xs ml-2 shrink-0"
                        :class="doneCount(row, row._sheetKey) === 3 ? 'text-green-600' : 'text-yellow-500'"
                        x-text="doneCount(row, row._sheetKey) === 3 ? '✓ 完了' : '△ 未確認 ' + doneCount(row, row._sheetKey) + '/3'"></span>
                </template>
                <template x-if="SHEETS[row._sheetKey]?.noPerspectives">
                  <span class="text-xs ml-2 shrink-0"
                        :class="row.q1_existence_status === '完了' ? 'text-green-600' : 'text-yellow-500'"
                        x-text="row.q1_existence_status === '完了' ? '✓ 完了' : '△ 未確認'"></span>
                </template>
              </div>

              <!-- 通常シート：折り畳み（3観点アイコン）-->
              <template x-if="!SHEETS[row._sheetKey]?.noPerspectives">
                <div x-show="!isExpanded(row._uid)" class="grid grid-cols-3 gap-1.5 px-4 pb-4">
                  <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                    <div :class="ps.color.bg + ' ' + ps.color.text"
                         class="rounded p-1.5 text-center">
                      <div class="text-xs mb-0.5" x-text="ps.label"></div>
                      <div class="text-xs font-medium" x-text="ps.color.icon"></div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- 通常シート：展開（観点の中身）-->
              <template x-if="!SHEETS[row._sheetKey]?.noPerspectives">
                <div x-show="isExpanded(row._uid)" class="space-y-2 px-4 pb-4">
                  <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                    <div :class="ps.color.bg" class="rounded-lg p-3">
                      <div class="flex items-center justify-between mb-1">
                        <span :class="ps.color.text" class="text-xs font-medium" x-text="ps.label"></span>
                        <span :class="ps.color.text" class="text-xs font-bold" x-text="ps.color.icon"></span>
                      </div>
                      <p :class="ps.content ? ps.color.text : 'text-gray-400'"
                         class="text-xs leading-relaxed whitespace-pre-wrap"
                         x-text="ps.content || '（未入力）'"></p>
                    </div>
                  </template>
                  <div x-show="row.free_memo" class="bg-white border border-gray-200 rounded-lg p-3">
                    <div class="flex items-center gap-1 mb-1 text-gray-400">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                      </svg>
                      <span class="text-xs font-medium">メモ</span>
                    </div>
                    <p class="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap" x-text="row.free_memo"></p>
                  </div>
                </div>
              </template>


              <!-- noPerspectives シート：展開（情報カード + メモカード）-->
              <template x-if="SHEETS[row._sheetKey]?.noPerspectives">
                <div x-show="isExpanded(row._uid)" class="px-4 pb-4 space-y-2" @click.stop>
                  <template x-for="extra in (SHEETS[row._sheetKey]?.expandedExtras?.(row) || [])" :key="extra.label">
                    <div class="bg-white border border-gray-200 rounded-lg p-3">
                      <div class="flex items-center gap-1 mb-1 text-gray-400">
                        <template x-if="extra.icon === 'phone'">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                          </svg>
                        </template>
                        <template x-if="extra.icon === 'mail'">
                          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                          </svg>
                        </template>
                        <span class="text-xs font-medium" x-text="extra.label"></span>
                      </div>
                      <p class="text-xs text-gray-700 leading-relaxed break-all" x-text="extra.value"></p>
                    </div>
                  </template>
                  <div x-show="row.free_memo" class="bg-white border border-gray-200 rounded-lg p-3">
                    <div class="flex items-center gap-1 mb-1 text-gray-400">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                      </svg>
                      <span class="text-xs font-medium">メモ</span>
                    </div>
                    <p class="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap" x-text="row.free_memo"></p>
                  </div>
                  <p x-show="!(SHEETS[row._sheetKey]?.expandedExtras?.(row)?.length) && !row.free_memo"
                     class="text-xs text-gray-400">（情報なし）</p>
                </div>
              </template>

            </div>

          </div>
        </template>
      </div>
    </div>
  </div>

    <!-- Bottom nav -->
    <div x-data="{ showGroups: false }">

      <!-- グループ選択シート -->
      <div x-show="showGroups"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-2"
           @click="showGroups = false"
           class="fixed inset-0 z-40">
        <div @click.stop
             class="fixed bottom-14 left-0 right-0 bg-white border-t rounded-t-2xl shadow-2xl z-50 p-4">
          <p class="text-xs text-gray-400 text-center mb-3 font-medium">グループ</p>
          <div class="grid grid-cols-2 gap-2">
            <a href="item-list.html?group=%E6%94%AF%E5%87%BA%E3%83%BB%E5%8F%8E%E5%85%A5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">支出・収入</a>
            <a href="item-list.html?group=%E8%B3%87%E7%94%A3%E3%83%BB%E8%B2%A0%E5%82%B5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">資産・負債</a>
            <a href="item-list.html?group=%E3%82%82%E3%81%97%E3%82%82%E3%81%AE%E6%99%82"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">もしもの時</a>
            <a href="item-list.html?group=%E3%81%AE%E3%81%93%E3%81%99%E3%82%82%E3%81%AE"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">のこすもの</a>
          </div>
        </div>
      </div>

      <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex z-30">
        <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-xs mt-0.5">ダッシュボード</span>
        </a>
        <button @click="showGroups = !showGroups"
                class="flex-1 flex flex-col items-center py-2 text-blue-600 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
          <span class="text-xs mt-0.5">グループ</span>
        </button>
        <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          <span class="text-xs mt-0.5">全項目</span>
        </a>
        <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="text-xs mt-0.5">設定</span>
        </a>
      </nav>
    </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
