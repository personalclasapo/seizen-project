<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 項目一覧</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-blue-100','text-blue-700','bg-rose-100','text-rose-700',
        'bg-green-100','text-green-700','bg-amber-100','text-amber-700',
        'bg-purple-100','text-purple-700','bg-teal-100','text-teal-700',
        'bg-orange-100','text-orange-700','bg-indigo-100','text-indigo-700',
      ]
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    function itemListApp() {
      return {
        loading: true,
        error: null,
        sheetKey: '',
        sheetDef: null,
        items: [],
        detailView: false,
        filterProgress: [],
        filterStatus: 'all',
        showFilter: false,

        activeFilterCount() {
          return this.filterProgress.length + (this.filterStatus !== 'all' ? 1 : 0);
        },

        filtered() {
          let rows = this.items;
          if (this.filterProgress.length > 0) {
            rows = rows.filter(r => {
              const d = doneCount(r);
              if (this.filterProgress.includes('done') && d === PERSPECTIVES.length) return true;
              if (this.filterProgress.includes('inProgress') && d > 0 && d < PERSPECTIVES.length) return true;
              if (this.filterProgress.includes('todo') && d === 0) return true;
              return false;
            });
          }
          if (this.filterStatus !== 'all') {
            rows = rows.filter(r => {
              const tag = this.sheetDef.statusTag?.(r) || null;
              if (this.filterStatus === 'active') return !tag || tag.norm === 'active';
              if (this.filterStatus === 'closing') return tag?.norm === 'closing';
              if (this.filterStatus === 'closed') return tag?.norm === 'closed';
              return true;
            });
          }
          return rows;
        },

        toggleProgress(s) {
          const i = this.filterProgress.indexOf(s);
          if (i >= 0) this.filterProgress.splice(i, 1); else this.filterProgress.push(s);
        },

        async init() {
          const params = new URLSearchParams(location.search);
          this.sheetKey = params.get('sheet') || 'cash_flow';
          this.sheetDef = SHEETS[this.sheetKey];
          if (!this.sheetDef) {
            this.error = '不正なシートキーです: ' + this.sheetKey;
            this.loading = false;
            return;
          }

          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const [items, members] = await Promise.all([
              getSheet(this.sheetKey),
              getSheet('family_member').catch(() => [])
            ]);
            loadFamilyMembers(members);
            this.items = items;
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        itemName(row) {
          return this.sheetDef.name(row);
        },

        itemStatusTag(row) {
          return this.sheetDef.statusTag?.(row) || null;
        },

        itemSub(row) {
          return this.sheetDef.sub(row);
        },

        itemAmountNum(row) {
          const n = row.monthly_amount || row.billing_amount;
          return n ? Number(n).toLocaleString() : '';
        },

        itemAmountCycle(row) {
          return formatCycle(row);
        },

        itemHolder(row) {
          return this.sheetDef.holder?.(row) || '';
        },

        itemPlan(row) {
          return row.plan || '';
        },

        perspectiveStatuses(row) {
          return PERSPECTIVES.map(p => ({
            label: p.label,
            status: row[p.statusCol] || '未確認',
            content: row[p.contentCol] || '',
            color: perspectiveColor(row[p.statusCol] || '未確認')
          }));
        },

        expandedRows: [],

        toggleExpand(rowId) {
          if (this.detailView) {
            // 全展開モードから個別管理に切り替え（タップした1件だけ閉じる）
            this.detailView = false;
            this.expandedRows = this.items.map(r => r._row).filter(id => id !== rowId);
          } else {
            const i = this.expandedRows.indexOf(rowId);
            if (i >= 0) this.expandedRows.splice(i, 1); else this.expandedRows.push(rowId);
          }
        },

        isExpanded(rowId) {
          return this.detailView || this.expandedRows.includes(rowId);
        },

        goDetail(row) {
          location.href = `item-detail.html?sheet=${this.sheetKey}&row=${row._row}`;
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="itemListApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a href="dashboard.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1" x-text="sheetDef?.group || ''"></p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4">

      <!-- ヘッダー -->
      <div class="flex items-center justify-between mb-4 pt-2">
        <div>
          <p class="text-lg font-medium" x-text="sheetDef?.group || ''"></p>
        </div>
        <span class="text-sm text-gray-400"
              x-text="filtered().length + '件'"></span>
      </div>

      <!-- 絞込・表示切替 -->
      <div class="flex items-center gap-1.5 mb-4">
        <button @click="showFilter = !showFilter"
          :class="activeFilterCount() > 0 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium flex items-center gap-1.5">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h18M7 9h10M11 14h2"/>
          </svg>
          絞込
          <span x-show="activeFilterCount() > 0"
                class="bg-blue-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-xs"
                x-text="activeFilterCount()"></span>
        </button>
        <button
          @click="detailView = false; expandedRows = []"
          :class="!detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          簡易
        </button>
        <button
          @click="detailView = true"
          :class="detailView ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-white text-gray-500 border-gray-200'"
          class="px-3 py-1.5 text-xs border rounded-lg font-medium">
          詳細
        </button>
        <a :href="'add-item.html?group=' + encodeURIComponent(sheetDef.group)"
          class="ml-auto flex items-center gap-1 px-3 py-1.5 text-xs bg-white border border-blue-300 text-blue-600 rounded-lg font-medium hover:bg-blue-50 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          新規登録
        </a>
      </div>

      <!-- Filter panel -->
      <div x-show="showFilter" class="bg-white rounded-xl p-4 shadow-sm space-y-3 mb-4">
        <div>
          <p class="text-xs text-gray-500 mb-2">進捗</p>
          <div class="flex gap-2">
            <button @click="toggleProgress('done')"
              :class="filterProgress.includes('done') ? 'bg-green-50 text-green-700 border-green-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">完了</button>
            <button @click="toggleProgress('inProgress')"
              :class="filterProgress.includes('inProgress') ? 'bg-yellow-50 text-yellow-700 border-yellow-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">進行中</button>
            <button @click="toggleProgress('todo')"
              :class="filterProgress.includes('todo') ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">TODO</button>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-500 mb-2">状態</p>
          <div class="flex gap-2 flex-wrap">
            <button @click="filterStatus = 'all'"
              :class="filterStatus === 'all' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">すべて</button>
            <button @click="filterStatus = 'active'"
              :class="filterStatus === 'active' ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">継続中</button>
            <button @click="filterStatus = 'closing'"
              :class="filterStatus === 'closing' ? 'bg-amber-50 text-amber-700 border-amber-300' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">解約予定</button>
            <button @click="filterStatus = 'closed'"
              :class="filterStatus === 'closed' ? 'bg-gray-200 text-gray-600 border-gray-400' : 'bg-gray-50 text-gray-600 border-gray-200'"
              class="px-3 py-1 text-xs border rounded-lg">解約済</button>
          </div>
        </div>
        <div class="flex items-center justify-between pt-1">
          <button @click="filterProgress = []; filterStatus = 'all'"
            class="text-xs text-gray-400 hover:text-gray-600">クリア</button>
          <button @click="showFilter = false"
            class="text-xs font-medium text-blue-600 hover:text-blue-800 px-3 py-1.5 rounded-lg hover:bg-blue-50">閉じる</button>
        </div>
      </div>

      <!-- 空状態 -->
      <div x-show="filtered().length === 0" class="text-center py-16 text-gray-400 text-sm">
        <p class="mb-1" x-text="items.length === 0 ? 'まだ項目がありません' : '該当する項目がありません'"></p>
        <p x-show="items.length === 0" class="text-xs">スプレッドシートにデータを追加してください</p>
      </div>

      <!-- 項目リスト -->
      <div class="space-y-3">
        <template x-for="row in filtered()" :key="row._row">
          <div class="bg-white rounded-xl shadow-sm overflow-hidden"
               :class="itemStatusTag(row)?.muted ? 'opacity-60' : ''">

            <!-- 上部ゾーン：項目情報 → 詳細ページへ -->
            <div @click="goDetail(row)"
                 class="px-4 pt-4 pb-3 cursor-pointer hover:bg-gray-50 transition-colors">
              <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-1.5 flex-1 min-w-0">
                  <p class="font-medium truncate" x-text="itemName(row)"></p>
                  <template x-if="itemStatusTag(row)">
                    <span :class="itemStatusTag(row).bg + ' ' + itemStatusTag(row).text"
                          class="text-xs px-1.5 py-0.5 rounded font-medium shrink-0 whitespace-nowrap"
                          x-text="itemStatusTag(row).label"></span>
                  </template>
                </div>
                <div class="flex items-center gap-2 ml-2 shrink-0">
                  <template x-if="itemHolder(row)">
                    <span :class="holderColor(itemHolder(row)).bg + ' ' + holderColor(itemHolder(row)).text"
                          class="text-xs px-2 py-0.5 rounded-full font-medium"
                          x-text="itemHolder(row)"></span>
                  </template>
                  <span class="text-xs text-gray-400" x-text="doneCount(row) + '/3'"></span>
                </div>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <template x-if="row.service_category">
                  <span class="text-xs text-gray-500 bg-gray-100 rounded px-1.5 py-0.5 shrink-0" x-text="row.service_category"></span>
                </template>
                <div x-show="itemAmountNum(row) || itemPlan(row)" class="flex items-baseline gap-1">
                  <span x-show="itemAmountNum(row)" class="text-xs text-gray-400">¥</span>
                  <span x-show="itemAmountNum(row)" class="text-base font-bold text-gray-800" x-text="itemAmountNum(row)"></span>
                  <span x-show="itemAmountCycle(row)" class="text-xs text-gray-400" x-text="'/' + itemAmountCycle(row)"></span>
                  <span x-show="itemPlan(row)" class="text-xs text-gray-400 mx-0.5">・</span>
                  <span x-show="itemPlan(row)" class="text-sm font-bold text-gray-800 truncate" x-text="itemPlan(row)"></span>
                </div>
              </div>
            </div>

            <!-- 下部ゾーン：観点 → 展開/折り畳み -->
            <div @click="toggleExpand(row._row)"
                 class="cursor-pointer hover:bg-gray-50 transition-colors select-none">
              <!-- 区切り線 + chevron -->
              <div class="flex items-center px-4 py-1.5">
                <div class="flex-1 border-t border-dashed border-gray-300"></div>
                <div class="mx-2">
                  <svg class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200"
                       :class="isExpanded(row._row) ? 'rotate-180' : ''"
                       fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </div>
                <div class="flex-1 border-t border-dashed border-gray-300"></div>
              </div>
              <!-- 折り畳み：3観点アイコン -->
              <div x-show="!isExpanded(row._row)" class="grid grid-cols-3 gap-1.5 px-4 pb-4">
                <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                  <div :class="ps.color.bg + ' ' + ps.color.text"
                       class="rounded p-1.5 text-center">
                    <div class="text-xs mb-0.5" x-text="ps.label"></div>
                    <div class="text-xs font-medium" x-text="ps.color.icon"></div>
                  </div>
                </template>
              </div>
              <!-- 展開：観点の中身 -->
              <div x-show="isExpanded(row._row)" class="space-y-2 px-4 pb-4">
                <template x-for="ps in perspectiveStatuses(row)" :key="ps.label">
                  <div :class="ps.color.bg" class="rounded-lg p-3">
                    <div class="flex items-center justify-between mb-1">
                      <span :class="ps.color.text" class="text-xs font-medium" x-text="ps.label"></span>
                      <span :class="ps.color.text" class="text-xs font-bold" x-text="ps.color.icon"></span>
                    </div>
                    <p :class="ps.content ? ps.color.text : 'text-gray-400'"
                       class="text-xs leading-relaxed"
                       x-text="ps.content || '（未入力）'"></p>
                  </div>
                </template>
              </div>
            </div>

          </div>
        </template>
      </div>
    </div>
  </div>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs mt-0.5">ホーム</span>
      </a>
      <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        <span class="text-xs mt-0.5">全項目</span>
      </a>
      <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs mt-0.5">設定</span>
      </a>
    </nav>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
