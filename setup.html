    const SAMPLE_ROWS = [

      ['cash_005','2026-06-02','2026-06-02','完了','家族が把握済み','完了','年金（厚生年金）、月185,000円','完了','年金証書は引き出しに保管。受け取りは自動振込','完了','死亡時は年金事務所に届け出が必要。14日以内','年金証書は和室の引き出し（上段）に保管','老齢厚生年金','年金','収入','父','月額','185000','185000','口座振込','継続中','手動入力','','']

      ['re_002','2026-06-02','2026-06-02','完了','家族が把握済み','未確認','','未確認','','未確認','','','土地','静岡県熱海市','父','5000000','なし','空き家']

    ];

    function apiReq(method, url, body) {
      return fetch(url, {
        method,
        headers: {
          Authorization: `Bearer ${getToken()}`,
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : undefined
      }).then(async res => {
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.error?.message || `API error ${res.status}`);
        }
        return res.json();
      });
    }

    function setupApp() {
      return {
        // ステップ: 'choose' | 'confirm' | 'initializing' | 'done'
        step: 'choose',
        selectedId: '',
        selectedName: '',
        manualId: '',
        showManual: false,
        logs: [],
        error: null,

        async init() {
          await waitForGsi();
          initAuth(
            () => { /* 認証済みのまま続行 */ },
            () => { window.location.href = 'index.html'; }
          );
        },

        async pickExisting() {
          this.error = null;
          try {
            const result = await pickSpreadsheet();
            if (!result) return;
            this.selectedId = result.id;
            this.selectedName = result.name;
            this.step = 'confirm';
          } catch (e) {
            this.error = e.message;
          }
        },

        async createNew() {
          this.error = null;
          try {
            const res = await apiReq('POST',
              'https://sheets.googleapis.com/v4/spreadsheets',
              { properties: { title: '生前整理データ' } }
            );
            this.selectedId = res.spreadsheetId;
            this.selectedName = res.properties.title;
            this.step = 'confirm';
          } catch (e) {
            this.error = e.message;
          }
        },

        applyManual() {
          const id = this.manualId.trim();
          if (!id) return;
          this.selectedId = id;
          this.selectedName = id;
          this.showManual = false;
          this.step = 'confirm';
        },

        back() {
          this.step = 'choose';
          this.selectedId = '';
          this.selectedName = '';
          this.error = null;
          this.logs = [];
        },

        log(msg) { this.logs.push(msg); },

        async initialize() {
          this.step = 'initializing';
          this.logs = [];
          this.error = null;
          setSpreadsheetId(this.selectedId);
          const base = `https://sheets.googleapis.com/v4/spreadsheets/${this.selectedId}`;
          try {
            this.log('シート一覧を確認中...');
            const info = await apiReq('GET', `${base}?fields=sheets.properties.title`);
            const existing = new Set(info.sheets.map(s => s.properties.title));

            const required = Object.keys(SHEET_HEADERS);
            const missing = required.filter(t => !existing.has(t));
            if (missing.length > 0) {
              this.log(`シートを作成: ${missing.join(', ')}`);
              await apiReq('POST', `${base}:batchUpdate`, {
                requests: missing.map(title => ({ addSheet: { properties: { title } } }))
              });
            } else {
              this.log('全シート確認済み');
            }

            this.log('ヘッダーを書き込み中...');
            await apiReq('POST', `${base}/values:batchUpdate`, {
              valueInputOption: 'RAW',
              data: required.map(sheet => ({
                range: `${sheet}!A1`,
                values: [SHEET_HEADERS[sheet]]
              }))
            });

            this.log('サンプルデータを確認中...');
            const cur = await apiReq('GET', `${base}/values/cash_flow!A2:A6`);
            if (!cur.values || cur.values.length === 0) {
              this.log('サンプルデータを追加中...');
              await apiReq('POST', `${base}/values:batchUpdate`, {
                valueInputOption: 'RAW',
                data: [{ range: 'cash_flow!A2', values: SAMPLE_ROWS }]
              });
            } else {
              this.log('既存データがあるためサンプル追加をスキップ');
            }

            const curCand = await apiReq('GET', `${base}/values/transaction_candidates!A2:A6`);
            if (!curCand.values || curCand.values.length === 0) {
              await apiReq('POST', `${base}/values:batchUpdate`, {
                valueInputOption: 'RAW',
                data: [{ range: 'transaction_candidates!A2', values: SAMPLE_CANDIDATES }]
              });
            }

            const sampleSheets = [
              { sheet: 'securities',     range: 'securities!A2:A3',     data: SAMPLE_SECURITIES },
              { sheet: 'crypto',         range: 'crypto!A2:A2',         data: SAMPLE_CRYPTO },
              { sheet: 'real_estate',    range: 'real_estate!A2:A3',    data: SAMPLE_REAL_ESTATE },
              { sheet: 'precious_metal', range: 'precious_metal!A2:A2', data: SAMPLE_PRECIOUS_METAL },
              { sheet: 'loan',           range: 'loan!A2:A2',           data: SAMPLE_LOAN },
            ];
            for (const s of sampleSheets) {
              const cur = await apiReq('GET', `${base}/values/${s.range}`);
              if (!cur.values || cur.values.length === 0) {
                await apiReq('POST', `${base}/values:batchUpdate`, {
                  valueInputOption: 'RAW',
                  data: [{ range: `${s.sheet}!A2`, values: s.data }]
                });
              }
            }

            this.log('✓ 完了');
            this.step = 'done';
          } catch (e) {
            this.error = e.message;
            this.step = 'confirm';
          }
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen flex items-center justify-center p-4">

  <div x-data="setupApp()" x-init="init()" class="w-full max-w-sm mx-auto">

    </div>

          情報はあなたのGoogleスプレッドシートに<br>直接保存されます
        </p>

        <div class="space-y-3">
          <button
            @click="createNew()"
            class="w-full py-3.5 bg-[#4A7C59] text-white rounded-lg text-sm font-medium hover:bg-[#3d6849] transition-colors">
            新規スプレッドシートを作成
          </button>

          <button
            @click="pickExisting()"
            class="w-full py-3.5 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            既存のスプレッドシートを選択
          </button>
        </div>

        <div class="mt-4">
          <button
            @click="showManual = !showManual"
            class="w-full text-xs text-gray-400 hover:text-gray-600 py-1 transition-colors">
            スプレッドシートIDを直接入力
          </button>
          <div x-show="showManual" class="mt-2 flex gap-2">
            <input
              x-model="manualId"
              type="text"
              placeholder="スプレッドシートID"
              class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-gray-400"
              @keyup.enter="applyManual()" />
            <button
              @click="applyManual()"
              class="px-3 py-2 bg-gray-700 text-white rounded-lg text-xs">決定</button>
          </div>
        </div>

        <div x-show="error" class="mt-4 bg-red-50 text-red-700 rounded-lg p-3 text-xs" x-text="error"></div>
      </div>

      <!-- ステップ2: 確認・初期化 -->
      <div x-show="step === 'confirm'" class="p-8">
        <p class="font-medium text-center mb-6">このシートを使いますか？</p>

        <div class="bg-gray-50 rounded-lg p-4 mb-6">
          <p class="text-xs text-gray-500 mb-1">選択したスプレッドシート</p>
          <p class="text-sm font-medium text-gray-800 break-all" x-text="selectedName"></p>
        </div>

        <div class="bg-amber-50 rounded-lg p-3 mb-6">
          <p class="text-xs text-gray-600 leading-relaxed">
            「初期化する」を押すと、必要なシートとヘッダーが自動で作成されます。既存データは上書きされません。
          </p>
        </div>

        <div x-show="error" class="bg-red-50 text-red-700 rounded-lg p-3 mb-4 text-xs" x-text="error"></div>

        <div class="space-y-2">
          <button
            @click="initialize()"
            class="w-full py-3.5 bg-[#4A7C59] text-white rounded-lg text-sm font-medium hover:bg-[#3d6849] transition-colors">
            初期化する
          </button>
          <button
            @click="back()"
            class="w-full py-2.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
            戻る
          </button>
        </div>
      </div>

      <!-- ステップ3: 初期化中 -->
      <div x-show="step === 'initializing'" class="p-8">
        <p class="font-medium text-center mb-6">初期化しています...</p>
        <div class="bg-gray-900 rounded-lg p-4 space-y-1 min-h-32">
          <template x-for="log in logs" :key="log">
            <p class="text-xs text-green-400 font-mono" x-text="log"></p>
          </template>
          <span class="text-xs text-gray-400 font-mono animate-pulse">実行中...</span>
        </div>
      </div>

      <!-- ステップ4: 完了 -->
      <div x-show="step === 'done'" class="p-8 text-center">
        <div class="w-14 h-14 bg-[#4A7C59] rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="font-medium mb-1">準備ができました</p>
        <p class="text-sm text-gray-500 mb-8">スプレッドシートの設定が完了しました</p>
        <a href="dashboard.html"
           class="block w-full py-3.5 bg-[#4A7C59] text-white rounded-lg text-sm font-medium hover:bg-[#3d6849] text-center transition-colors">
          はじめる
        </a>
      </div>

    </div>

  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
