<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 項目詳細</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-blue-100','text-blue-700','bg-rose-100','text-rose-700',
        'bg-green-100','text-green-700','bg-amber-100','text-amber-700',
        'bg-purple-100','text-purple-700','bg-teal-100','text-teal-700',
        'bg-orange-100','text-orange-700','bg-indigo-100','text-indigo-700',
      ]
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    const PENCIL_SVG = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>`;

    function itemDetailApp() {
      return {
        loading: true,
        error: null,
        sheetKey: '',
        sheetDef: null,
        row: null,
        targetRowIndex: null,
        familyMembers: [],
        singleStatusSaving: false,

        perspectiveModal: {
          open: false, saving: false, error: null,
          statusCol: '', contentCol: '', label: '',
          status: '未確認', content: '', dirty: false
        },

        infoModal: {
          open: false, saving: false, error: null, dirty: false,
          f: {}
        },

        memoModal: {
          open: false, saving: false, error: null, content: '', dirty: false
        },

        allEditModal: {
          open: false, saving: false, deleting: false, error: null, dirty: false,
          f: {}, perspectives: [], memo: ''
        },

        async init() {
          const params = new URLSearchParams(location.search);
          this.sheetKey = params.get('sheet') || 'cash_flow';
          this.targetRowIndex = parseInt(params.get('row'));
          this.sheetDef = SHEETS[this.sheetKey];

          if (!this.sheetDef || !this.targetRowIndex) {
            this.error = 'URLパラメータが不正です';
            this.loading = false;
            return;
          }

          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const [rows, members] = await Promise.all([
              getSheet(this.sheetKey),
              getSheet('family_member').catch(() => [])
            ]);
            loadFamilyMembers(members);
            this.familyMembers = members;
            this.row = rows.find(r => r._row === this.targetRowIndex) || null;
            if (!this.row) this.error = '項目が見つかりません';
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        perspectives() {
          if (!this.row) return [];
          return PERSPECTIVES.map(p => ({
            key: p.key,
            statusCol: p.statusCol,
            contentCol: p.contentCol,
            label: p.label,
            status: this.row[p.statusCol] || '未確認',
            content: this.row[p.contentCol] || '',
            color: perspectiveColor(this.row[p.statusCol] || '未確認')
          }));
        },

        infoCards() {
          if (!this.row || !this.sheetDef.infoCards) return [];
          return this.sheetDef.infoCards(this.row);
        },

        itemName() { return this.row ? this.sheetDef.name(this.row) : ''; },
        itemStatusTag() { return this.row ? (this.sheetDef.statusTag?.(this.row) || null) : null; },
        headerTag() { return this.row ? (this.sheetDef.headerTag?.(this.row) || '') : ''; },
        backLink() {
          const grp = this.sheetDef?.group;
          if (grp) return `item-list.html?group=${encodeURIComponent(grp)}`;
          return `item-list.html?sheet=${this.sheetKey}`;
        },

        // ── 観点編集 ──
        autoGrow(el) {
          if (!el) return;
          el.style.height = 'auto';
          el.style.height = el.scrollHeight + 'px';
        },

        openPerspectiveModal(ps) {
          this.perspectiveModal = {
            open: true, saving: false, error: null,
            statusCol: ps.statusCol, contentCol: ps.contentCol, label: ps.label,
            status: ps.status, content: ps.content, dirty: false
          };
        },

        closePerspectiveModal() {
          if (this.perspectiveModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.perspectiveModal.open = false;
        },

        async savePerspective() {
          this.perspectiveModal.saving = true;
          this.perspectiveModal.error = null;
          try {
            const updated = { ...this.row };
            updated[this.perspectiveModal.statusCol] = this.perspectiveModal.status;
            updated[this.perspectiveModal.contentCol] = this.perspectiveModal.content;
            await saveRow(this.sheetKey, this.row._row, updated, getAllCols(this.sheetKey));
            this.row[this.perspectiveModal.statusCol] = this.perspectiveModal.status;
            this.row[this.perspectiveModal.contentCol] = this.perspectiveModal.content;
            this.perspectiveModal.open = false;
          } catch (e) {
            this.perspectiveModal.error = e.message;
          }
          this.perspectiveModal.saving = false;
        },

        // ── 基本情報編集 ──
        openInfoModal() {
          const r = this.row;
          let f = {};
          if (this.sheetKey === 'cash_flow') {
            f = {
              service_name: r.service_name || '',
              service_category: r.service_category || 'その他',
              billing_amount: r.billing_amount || '',
              billing_cycle: r.billing_cycle || '月額',
              contract_holder_id: r.contract_holder_id || '',
              plan: r.plan || '',
              payment_method: r.payment_method || '',
              status: r.status || '継続中'
            };
          } else if (this.sheetKey === 'bank_account') {
            f = {
              bank_name: r.bank_name || '',
              branch_name: r.branch_name || '',
              account_type: r.account_type || '',
              estimated_amount: r.estimated_amount || '',
              account_holder_id: r.account_holder_id || '',
              account_status: r.account_status || 'メイン',
              net_banking_usage: r.net_banking_usage || ''
            };
          } else if (this.sheetKey === 'insurance') {
            f = {
              insurance_company: r.insurance_company || '',
              product_name: r.product_name || '',
              insurance_type: r.insurance_type || '',
              contract_holder_id: r.contract_holder_id || '',
              insured_person_id: r.insured_person_id || '',
              beneficiary_id: r.beneficiary_id || '',
              estimated_amount: r.estimated_amount || '',
              maturity_date: r.maturity_date || '',
              payment_status: r.payment_status || '',
              account_status: r.account_status || '継続中'
            };
          } else if (this.sheetKey === 'contact_network') {
            f = {
              contact_name:        r.contact_name        || '',
              relationship:        r.relationship        || '',
              notify_timing:       r.notify_timing       || '',
              phone_number:        r.phone_number        || '',
              email:               r.email               || '',
              subject_id:          r.subject_id          || '',
              q1_existence_status: r.q1_existence_status || '未確認'
            };
          } else if (this.sheetKey === 'medical_info') {
            f = {
              subject_id:          r.subject_id          || '',
              medical_category:    r.medical_category    || '',
              title:               r.title               || '',
              q1_existence_status: r.q1_existence_status || '未確認'
            };
          }
          this.infoModal = { open: true, saving: false, error: null, dirty: false, f };
        },

        closeInfoModal() {
          if (this.infoModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.infoModal.open = false;
        },

        async saveInfoModal() {
          this.infoModal.saving = true;
          this.infoModal.error = null;
          try {
            const updated = { ...this.row, ...this.infoModal.f };
            if (this.sheetKey === 'cash_flow') {
              updated.monthly_amount = this.infoModal.f.billing_cycle === '月額'
                ? this.infoModal.f.billing_amount : '';
            }
            await saveRow(this.sheetKey, this.row._row, updated, getAllCols(this.sheetKey));
            Object.assign(this.row, updated);
            this.infoModal.open = false;
          } catch (e) {
            this.infoModal.error = e.message;
          }
          this.infoModal.saving = false;
        },

        // ── すべて編集 ──
        _buildInfoFields() {
          const r = this.row;
          if (this.sheetKey === 'cash_flow') return {
            service_name: r.service_name || '', service_category: r.service_category || 'その他',
            billing_amount: r.billing_amount || '',
            billing_cycle: r.billing_cycle || '月額', contract_holder_id: r.contract_holder_id || '',
            plan: r.plan || '', status: r.status || '継続中'
          };
          if (this.sheetKey === 'bank_account') return {
            bank_name: r.bank_name || '', branch_name: r.branch_name || '',
            account_type: r.account_type || '', estimated_amount: r.estimated_amount || '',
            account_holder_id: r.account_holder_id || '',
            account_status: r.account_status || 'メイン', net_banking_usage: r.net_banking_usage || ''
          };
          if (this.sheetKey === 'insurance') return {
            insurance_company: r.insurance_company || '', product_name: r.product_name || '',
            insurance_type: r.insurance_type || '', contract_holder_id: r.contract_holder_id || '',
            insured_person_id: r.insured_person_id || '', beneficiary_id: r.beneficiary_id || '',
            estimated_amount: r.estimated_amount || '', maturity_date: r.maturity_date || '',
            payment_status: r.payment_status || '', account_status: r.account_status || '継続中'
          };
          if (this.sheetKey === 'contact_network') return {
            contact_name: r.contact_name || '', relationship: r.relationship || '',
            notify_timing: r.notify_timing || '', phone_number: r.phone_number || '',
            email: r.email || '', subject_id: r.subject_id || '',
            q1_existence_status: r.q1_existence_status || '未確認'
          };
          if (this.sheetKey === 'medical_info') return {
            subject_id: r.subject_id || '', medical_category: r.medical_category || '',
            title: r.title || '', q1_existence_status: r.q1_existence_status || '未確認'
          };
          return {};
        },

        openAllEditModal() {
          this.allEditModal = {
            open: true, saving: false, deleting: false, error: null, dirty: false,
            f: this._buildInfoFields(),
            perspectives: PERSPECTIVES.map(p => ({
              statusCol: p.statusCol, contentCol: p.contentCol, label: p.label,
              status: this.row[p.statusCol] || '未確認',
              content: this.row[p.contentCol] || ''
            })),
            memo: this.row.free_memo || ''
          };
        },

        closeAllEditModal() {
          if (this.allEditModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.allEditModal.open = false;
        },

        async saveAllEdit() {
          this.allEditModal.saving = true;
          this.allEditModal.error = null;
          try {
            const updated = { ...this.row, ...this.allEditModal.f };
            for (const ps of this.allEditModal.perspectives) {
              updated[ps.statusCol] = ps.status;
              updated[ps.contentCol] = ps.content;
            }
            updated.free_memo = this.allEditModal.memo;
            if (this.sheetKey === 'cash_flow') {
              updated.monthly_amount = this.allEditModal.f.billing_cycle === '月額'
                ? this.allEditModal.f.billing_amount : '';
            }
            await saveRow(this.sheetKey, this.row._row, updated, getAllCols(this.sheetKey));
            Object.assign(this.row, updated);
            this.allEditModal.open = false;
          } catch (e) {
            this.allEditModal.error = e.message;
          }
          this.allEditModal.saving = false;
        },

        async deleteItem() {
          if (!confirm('この項目を削除しますか？\nこの操作は取り消せません')) return;
          this.allEditModal.deleting = true;
          this.allEditModal.error = null;
          try {
            await deleteRow(this.sheetKey, this.row._row);
            window.location.href = this.backLink();
          } catch (e) {
            this.allEditModal.error = e.message;
            this.allEditModal.deleting = false;
          }
        },

        // ── noPerspectives ステータストグル ──
        async toggleSingleStatus() {
          const next = this.row.q1_existence_status === '完了' ? '未確認' : '完了';
          this.singleStatusSaving = true;
          try {
            const updated = { ...this.row, q1_existence_status: next };
            await saveRow(this.sheetKey, this.row._row, updated, getAllCols(this.sheetKey));
            this.row.q1_existence_status = next;
          } catch (e) {
            alert('保存に失敗しました: ' + e.message);
          }
          this.singleStatusSaving = false;
        },

        // ── メモ編集 ──
        openMemoModal() {
          this.memoModal = {
            open: true, saving: false, error: null,
            content: this.row.free_memo || '', dirty: false
          };
        },

        closeMemoModal() {
          if (this.memoModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.memoModal.open = false;
        },

        async saveMemoModal() {
          this.memoModal.saving = true;
          this.memoModal.error = null;
          try {
            const updated = { ...this.row, free_memo: this.memoModal.content };
            await saveRow(this.sheetKey, this.row._row, updated, getAllCols(this.sheetKey));
            this.row.free_memo = this.memoModal.content;
            this.memoModal.open = false;
          } catch (e) {
            this.memoModal.error = e.message;
          }
          this.memoModal.saving = false;
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="itemDetailApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a :href="backLink()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1 truncate" x-text="itemName()"></p>
      <button x-show="!loading && row" @click="openAllEditModal()"
              class="text-sm font-medium text-blue-600 hover:text-blue-800 shrink-0 mr-3">編集</button>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600 shrink-0">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error && row" class="max-w-3xl mx-auto p-4 space-y-4">

      <!-- ヘッダー -->
      <div class="pt-2">
        <p class="text-xs text-gray-400 mb-1" x-text="sheetDef?.group || ''"></p>
        <div class="flex items-start justify-between">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <p class="text-xl font-medium" x-text="itemName()"></p>
              <template x-if="itemStatusTag()">
                <span :class="itemStatusTag().bg + ' ' + itemStatusTag().text"
                      class="text-xs px-1.5 py-0.5 rounded font-medium"
                      x-text="itemStatusTag().label"></span>
              </template>
              <template x-if="headerTag()">
                <span class="text-xs text-gray-500 bg-gray-100 rounded px-1.5 py-0.5 font-medium"
                      x-text="headerTag()"></span>
              </template>
            </div>
          </div>
          <div x-show="!sheetDef?.noPerspectives" class="text-right ml-4 shrink-0">
            <p class="text-2xl font-medium leading-none"
               :class="row && doneCount(row, sheetKey) === PERSPECTIVES.length ? 'text-green-600' : 'text-yellow-500'"
               x-text="row ? doneCount(row, sheetKey) + '/3' : ''"></p>
            <p class="text-xs text-gray-400 mt-0.5">観点完了</p>
          </div>
          <div x-show="sheetDef?.noPerspectives" class="text-right ml-4 shrink-0">
            <button @click="toggleSingleStatus()"
                    :disabled="singleStatusSaving"
                    :class="row?.q1_existence_status === '完了' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-yellow-50 text-yellow-700 border-yellow-200'"
                    class="px-3 py-1.5 text-xs border rounded-lg font-medium disabled:opacity-50"
                    x-text="singleStatusSaving ? '保存中...' : (row?.q1_existence_status === '完了' ? '✓ 確認済み' : '△ 未確認')">
            </button>
          </div>
        </div>
      </div>

      <!-- 情報カード -->
      <div x-show="infoCards().length > 0" class="bg-white rounded-xl px-5 py-4 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs text-gray-400">基本情報</p>
          <button @click="openInfoModal()"
                  class="text-gray-400 hover:text-gray-600 transition-colors p-1 -m-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </button>
        </div>
        <div class="flex flex-wrap gap-x-8 gap-y-3">
          <template x-for="card in infoCards()" :key="card.label">
            <div>
              <p class="text-xs text-gray-400 mb-0.5" x-text="card.label"></p>
              <div x-show="card.type === 'amount'" class="flex items-baseline gap-0.5">
                <span class="text-xs text-gray-400">¥</span>
                <span class="text-xl font-bold text-gray-800" x-text="card.amountNum"></span>
                <span x-show="card.amountCycle" class="text-xs text-gray-400" x-text="'/' + card.amountCycle"></span>
              </div>
              <p x-show="card.type !== 'amount'" class="text-base font-bold text-gray-800" x-text="card.value"></p>
            </div>
          </template>
        </div>
      </div>

      <!-- 3観点（縦並び）: noPerspectives シートでは非表示 -->
      <div x-show="!sheetDef?.noPerspectives" class="space-y-3">
        <template x-for="ps in perspectives()" :key="ps.label">
          <div :class="ps.color.bg" class="rounded-xl p-4">
            <div class="flex items-center justify-between mb-2">
              <span :class="ps.color.text" class="text-sm font-medium" x-text="ps.label"></span>
              <div class="flex items-center gap-2">
                <span :class="ps.color.text" class="text-base font-bold" x-text="ps.color.icon"></span>
                <button @click.stop="openPerspectiveModal(ps)"
                        :class="ps.color.text"
                        class="opacity-50 hover:opacity-100 transition-opacity">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                  </svg>
                </button>
              </div>
            </div>
            <p :class="ps.content ? ps.color.text : 'text-gray-400'"
               class="text-sm leading-relaxed whitespace-pre-wrap"
               x-text="ps.content || '（未入力）'"></p>
          </div>
        </template>
      </div>

      <!-- メモ -->
      <div x-show="row" class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <p class="text-sm font-medium text-gray-600">メモ</p>
          <button @click="openMemoModal()"
                  class="text-gray-400 hover:text-gray-600 transition-colors p-1 -m-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </button>
        </div>
        <p :class="row?.free_memo ? 'text-gray-700' : 'text-gray-400'"
           class="text-sm leading-relaxed whitespace-pre-wrap" x-text="row?.free_memo || '（未入力）'"></p>
      </div>

    </div>

    <!-- すべて編集モーダル -->
    <div x-show="allEditModal.open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="display:none">
      <div class="absolute inset-0 bg-black/40" @click="closeAllEditModal()"></div>
      <div class="relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg mx-0 sm:mx-4 shadow-xl max-h-[90vh] flex flex-col" @click.stop>

        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b shrink-0">
          <p class="font-medium" x-text="itemName() + ' を編集'"></p>
          <button @click="closeAllEditModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="px-5 py-4 space-y-5 overflow-y-auto flex-1">

          <!-- 基本情報セクション -->
          <div>
            <p class="text-xs font-medium text-gray-400 mb-3">基本情報</p>
            <div class="space-y-3">
              <template x-if="sheetKey === 'cash_flow'">
                <div class="space-y-3">
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">サービス名</label>
                    <input type="text" x-model="allEditModal.f.service_name" @input="allEditModal.dirty = true"
                           class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                  </div>
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">種別</label>
                    <select x-model="allEditModal.f.service_category" @change="allEditModal.dirty = true"
                            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                      <option>サブスク</option><option>サブスク（動画配信）</option><option>公共料金</option>
                      <option>公共料金（電気）</option><option>通信費</option><option>メディア（NHK・新聞）</option>
                      <option>保険</option><option>税金</option><option>年金</option><option>その他</option>
                    </select>
                  </div>
                  <div class="flex gap-3">
                    <div class="flex-1">
                      <label class="text-xs text-gray-500 block mb-1">金額</label>
