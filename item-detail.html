<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 項目詳細</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    const PENCIL_SVG = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>`;

    function itemDetailApp() {
      return {
        loading: true,
        error: null,
        sheetKey: '',
        sheetDef: null,
        row: null,
        targetRowIndex: null,
        familyMembers: [],

        perspectiveModal: {
          open: false, saving: false, error: null,
          statusCol: '', contentCol: '', label: '',
          status: '未確認', content: '', dirty: false
        },

        infoModal: {
          open: false, saving: false, error: null, dirty: false,
          f: {}
        },

        memoModal: {
          open: false, saving: false, error: null, content: '', dirty: false
        },

        allEditModal: {
          open: false, saving: false, deleting: false, error: null, dirty: false,
          f: {}, perspectives: [], memo: ''
        },

        async init() {
          const params = new URLSearchParams(location.search);
          this.sheetKey = params.get('sheet') || 'cash_flow';
          this.targetRowIndex = parseInt(params.get('row'));
          this.sheetDef = SHEETS[this.sheetKey];

          if (!this.sheetDef || !this.targetRowIndex) {
            this.error = 'URLパラメータが不正です';
            this.loading = false;
            return;
          }

          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const [rows, members] = await Promise.all([
              getSheet(this.sheetKey),
              getSheet('family_member').catch(() => [])
            ]);
            loadFamilyMembers(members);
            this.familyMembers = members;
            this.row = rows.find(r => r._row === this.targetRowIndex) || null;
            if (!this.row) this.error = '項目が見つかりません';
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        perspectives() {
          if (!this.row) return [];
          return PERSPECTIVES.map(p => ({
            key: p.key,
            statusCol: p.statusCol,
            contentCol: p.contentCol,
            label: p.label,
            status: this.row[p.statusCol] || '未確認',
            content: this.row[p.contentCol] || '',
            color: perspectiveColor(this.row[p.statusCol] || '未確認')
          }));
        },

        infoCards() {
          if (!this.row || !this.sheetDef.infoCards) return [];
          return this.sheetDef.infoCards(this.row);
        },

        itemName() { return this.row ? this.sheetDef.name(this.row) : ''; },
        itemStatusTag() { return this.row ? (this.sheetDef.statusTag?.(this.row) || null) : null; },
        backLink() { return `item-list.html?sheet=${this.sheetKey}`; },

        // ── 観点編集 ──
        openPerspectiveModal(ps) {
          this.perspectiveModal = {
            open: true, saving: false, error: null,
            statusCol: ps.statusCol, contentCol: ps.contentCol, label: ps.label,
            status: ps.status, content: ps.content, dirty: false
          };
        },

        closePerspectiveModal() {
          if (this.perspectiveModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.perspectiveModal.open = false;
        },

        async savePerspective() {
          this.perspectiveModal.saving = true;
          this.perspectiveModal.error = null;
          try {
            const updated = { ...this.row };
            updated[this.perspectiveModal.statusCol] = this.perspectiveModal.status;
            updated[this.perspectiveModal.contentCol] = this.perspectiveModal.content;
            await updateRow(this.sheetKey, this.row._row, toRow(updated, getAllCols(this.sheetKey)));
            this.row[this.perspectiveModal.statusCol] = this.perspectiveModal.status;
            this.row[this.perspectiveModal.contentCol] = this.perspectiveModal.content;
            this.perspectiveModal.open = false;
          } catch (e) {
            this.perspectiveModal.error = e.message;
          }
          this.perspectiveModal.saving = false;
        },

        // ── 基本情報編集 ──
        openInfoModal() {
          const r = this.row;
          let f = {};
          if (this.sheetKey === 'cash_flow') {
            f = {
              service_name: r.service_name || '',
              service_category: r.service_category || 'その他',
              billing_amount: r.billing_amount || '',
              billing_cycle: r.billing_cycle || '月額',
              contract_holder_id: r.contract_holder_id || '',
              plan: r.plan || '',
              payment_method: r.payment_method || '',
              status: r.status || '継続中'
            };
          } else if (this.sheetKey === 'bank_account') {
            f = {
              bank_name: r.bank_name || '',
              branch_name: r.branch_name || '',
              account_type: r.account_type || '',
              account_holder_id: r.account_holder_id || '',
              account_status: r.account_status || 'メイン',
              net_banking_usage: r.net_banking_usage || ''
            };
          } else if (this.sheetKey === 'insurance') {
            f = {
              insurance_company: r.insurance_company || '',
              product_name: r.product_name || '',
              insurance_type: r.insurance_type || '',
              contract_holder_id: r.contract_holder_id || '',
              insured_person_id: r.insured_person_id || '',
              beneficiary_id: r.beneficiary_id || '',
              payment_status: r.payment_status || '',
              account_status: r.account_status || '継続中'
            };
          }
          this.infoModal = { open: true, saving: false, error: null, dirty: false, f };
        },

        closeInfoModal() {
          if (this.infoModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.infoModal.open = false;
        },

        async saveInfoModal() {
          this.infoModal.saving = true;
          this.infoModal.error = null;
          try {
            const updated = { ...this.row, ...this.infoModal.f };
            if (this.sheetKey === 'cash_flow') {
              updated.monthly_amount = this.infoModal.f.billing_cycle === '月額'
                ? this.infoModal.f.billing_amount : '';
            }
            await updateRow(this.sheetKey, this.row._row, toRow(updated, getAllCols(this.sheetKey)));
            Object.assign(this.row, updated);
            this.infoModal.open = false;
          } catch (e) {
            this.infoModal.error = e.message;
          }
          this.infoModal.saving = false;
        },

        // ── すべて編集 ──
        _buildInfoFields() {
          const r = this.row;
          if (this.sheetKey === 'cash_flow') return {
            service_name: r.service_name || '', service_category: r.service_category || 'その他',
            billing_amount: r.billing_amount || '',
            billing_cycle: r.billing_cycle || '月額', contract_holder_id: r.contract_holder_id || '',
            plan: r.plan || '', status: r.status || '継続中'
          };
          if (this.sheetKey === 'bank_account') return {
            bank_name: r.bank_name || '', branch_name: r.branch_name || '',
            account_type: r.account_type || '', account_holder_id: r.account_holder_id || '',
            account_status: r.account_status || 'メイン', net_banking_usage: r.net_banking_usage || ''
          };
          if (this.sheetKey === 'insurance') return {
            insurance_company: r.insurance_company || '', product_name: r.product_name || '',
            insurance_type: r.insurance_type || '', contract_holder_id: r.contract_holder_id || '',
            insured_person_id: r.insured_person_id || '', beneficiary_id: r.beneficiary_id || '',
            payment_status: r.payment_status || '', account_status: r.account_status || '継続中'
          };
          return {};
        },

        openAllEditModal() {
          this.allEditModal = {
            open: true, saving: false, deleting: false, error: null, dirty: false,
            f: this._buildInfoFields(),
            perspectives: PERSPECTIVES.map(p => ({
              statusCol: p.statusCol, contentCol: p.contentCol, label: p.label,
              status: this.row[p.statusCol] || '未確認',
              content: this.row[p.contentCol] || ''
            })),
            memo: this.row.free_memo || ''
          };
        },

        closeAllEditModal() {
          if (this.allEditModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.allEditModal.open = false;
        },

        async saveAllEdit() {
          this.allEditModal.saving = true;
          this.allEditModal.error = null;
          try {
            const updated = { ...this.row, ...this.allEditModal.f };
            for (const ps of this.allEditModal.perspectives) {
              updated[ps.statusCol] = ps.status;
              updated[ps.contentCol] = ps.content;
            }
            updated.free_memo = this.allEditModal.memo;
            if (this.sheetKey === 'cash_flow') {
              updated.monthly_amount = this.allEditModal.f.billing_cycle === '月額'
                ? this.allEditModal.f.billing_amount : '';
            }
            await updateRow(this.sheetKey, this.row._row, toRow(updated, getAllCols(this.sheetKey)));
            Object.assign(this.row, updated);
            this.allEditModal.open = false;
          } catch (e) {
            this.allEditModal.error = e.message;
          }
          this.allEditModal.saving = false;
        },

        async deleteItem() {
          if (!confirm('この項目を削除しますか？\nこの操作は取り消せません')) return;
          this.allEditModal.deleting = true;
          this.allEditModal.error = null;
          try {
            await deleteRow(this.sheetKey, this.row._row);
            window.location.href = this.backLink();
          } catch (e) {
            this.allEditModal.error = e.message;
            this.allEditModal.deleting = false;
          }
        },

        // ── メモ編集 ──
        openMemoModal() {
          this.memoModal = {
            open: true, saving: false, error: null,
            content: this.row.free_memo || '', dirty: false
          };
        },

        closeMemoModal() {
          if (this.memoModal.dirty && !confirm('変更を破棄しますか？')) return;
          this.memoModal.open = false;
        },

        async saveMemoModal() {
          this.memoModal.saving = true;
          this.memoModal.error = null;
          try {
            const updated = { ...this.row, free_memo: this.memoModal.content };
            await updateRow(this.sheetKey, this.row._row, toRow(updated, getAllCols(this.sheetKey)));
            this.row.free_memo = this.memoModal.content;
            this.memoModal.open = false;
          } catch (e) {
            this.memoModal.error = e.message;
          }
          this.memoModal.saving = false;
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="itemDetailApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a :href="backLink()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1 truncate" x-text="itemName()"></p>
      <button x-show="!loading && row" @click="openAllEditModal()"
              class="text-sm font-medium text-blue-600 hover:text-blue-800 shrink-0 mr-3">編集</button>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600 shrink-0">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error && row" class="max-w-3xl mx-auto p-4 space-y-4">

      <!-- ヘッダー -->
      <div class="pt-2">
        <p class="text-xs text-gray-400 mb-1" x-text="sheetDef?.group || ''"></p>
        <div class="flex items-start justify-between">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <p class="text-xl font-medium" x-text="itemName()"></p>
              <template x-if="itemStatusTag()">
                <span :class="itemStatusTag().bg + ' ' + itemStatusTag().text"
                      class="text-xs px-1.5 py-0.5 rounded font-medium"
                      x-text="itemStatusTag().label"></span>
              </template>
              <template x-if="row?.service_category">
                <span class="text-xs text-gray-500 bg-gray-100 rounded px-1.5 py-0.5 font-medium"
                      x-text="row.service_category"></span>
              </template>
            </div>
          </div>
          <div class="text-right ml-4 shrink-0">
            <p class="text-2xl font-medium leading-none"
               :class="row && doneCount(row) === PERSPECTIVES.length ? 'text-green-600' : 'text-yellow-500'"
               x-text="row ? doneCount(row) + '/3' : ''"></p>
            <p class="text-xs text-gray-400 mt-0.5">観点完了</p>
          </div>
        </div>
      </div>

      <!-- 情報カード -->
      <div x-show="infoCards().length > 0" class="bg-white rounded-xl px-5 py-4 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs text-gray-400">基本情報</p>
          <button @click="openInfoModal()"
                  class="text-gray-400 hover:text-gray-600 transition-colors p-1 -m-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </button>
        </div>
        <div class="flex flex-wrap gap-x-8 gap-y-3">
          <template x-for="card in infoCards()" :key="card.label">
            <div>
              <p class="text-xs text-gray-400 mb-0.5" x-text="card.label"></p>
              <div x-show="card.type === 'amount'" class="flex items-baseline gap-0.5">
                <span class="text-xs text-gray-400">¥</span>
                <span class="text-xl font-bold text-gray-800" x-text="card.amountNum"></span>
                <span x-show="card.amountCycle" class="text-xs text-gray-400" x-text="'/' + card.amountCycle"></span>
              </div>
              <p x-show="card.type !== 'amount'" class="text-base font-bold text-gray-800" x-text="card.value"></p>
            </div>
          </template>
        </div>
      </div>

      <!-- 3観点（縦並び） -->
      <div class="space-y-3">
        <template x-for="ps in perspectives()" :key="ps.label">
          <div :class="ps.color.bg" class="rounded-xl p-4">
            <div class="flex items-center justify-between mb-2">
              <span :class="ps.color.text" class="text-sm font-medium" x-text="ps.label"></span>
              <div class="flex items-center gap-2">
                <span :class="ps.color.text" class="text-base font-bold" x-text="ps.color.icon"></span>
                <button @click.stop="openPerspectiveModal(ps)"
                        :class="ps.color.text"
                        class="opacity-50 hover:opacity-100 transition-opacity">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                  </svg>
                </button>
              </div>
            </div>
            <p :class="ps.content ? ps.color.text : 'text-gray-400'"
               class="text-sm leading-relaxed"
               x-text="ps.content || '（未入力）'"></p>
          </div>
        </template>
      </div>

      <!-- メモ -->
      <div x-show="row" class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <p class="text-sm font-medium text-gray-600">メモ</p>
          <button @click="openMemoModal()"
                  class="text-gray-400 hover:text-gray-600 transition-colors p-1 -m-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </button>
        </div>
        <p :class="row?.free_memo ? 'text-gray-700' : 'text-gray-400'"
           class="text-sm leading-relaxed" x-text="row?.free_memo || '（未入力）'"></p>
      </div>

    </div>

    <!-- すべて編集モーダル -->
    <div x-show="allEditModal.open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="display:none">
      <div class="absolute inset-0 bg-black/40" @click="closeAllEditModal()"></div>
      <div class="relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg mx-0 sm:mx-4 shadow-xl max-h-[90vh] flex flex-col" @click.stop>

        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b shrink-0">
          <p class="font-medium" x-text="itemName() + ' を編集'"></p>
          <button @click="closeAllEditModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="px-5 py-4 space-y-5 overflow-y-auto flex-1">

          <!-- 基本情報セクション -->
          <div>
            <p class="text-xs font-medium text-gray-400 mb-3">基本情報</p>
            <div class="space-y-3">
              <template x-if="sheetKey === 'cash_flow'">
                <div class="space-y-3">
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">サービス名</label>
                    <input type="text" x-model="allEditModal.f.service_name" @input="allEditModal.dirty = true"
                           class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                  </div>
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">種別</label>
                    <select x-model="allEditModal.f.service_category" @change="allEditModal.dirty = true"
                            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                      <option>サブスク</option><option>サブスク（動画配信）</option><option>公共料金</option>
                      <option>公共料金（電気）</option><option>通信費</option><option>メディア（NHK・新聞）</option>
                      <option>保険</option><option>税金</option><option>年金</option><option>その他</option>
                    </select>
                  </div>
                  <div class="flex gap-3">
                    <div class="flex-1">
                      <label class="text-xs text-gray-500 block mb-1">金額</label>
                      <input type="number" x-model="allEditModal.f.billing_amount" @input="allEditModal.dirty = true"
                             class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                    </div>
                    <div class="w-32">
                      <label class="text-xs text-gray-500 block mb-1">請求サイクル</label>
                      <select x-model="allEditModal.f.billing_cycle" @change="allEditModal.dirty = true"
                              class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                        <option>月額</option><option>年額</option><option>隔月</option><option>その他</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">プラン（任意）</label>
                    <input type="text" x-model="allEditModal.f.plan" @input="allEditModal.dirty = true"
                           class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                  </div>
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">契約者</label>
                    <select x-model="allEditModal.f.contract_holder_id" @change="allEditModal.dirty = true"
                            class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                      <option value="">（未設定）</option>
                      <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                    </select>
                  </div>
                  <div>
                    <label class="text-xs text-gray-500 block mb-1">状態</label>
                    <div class="flex gap-2">
                      <template x-for="s in ['継続中', '解約予定', '解約済']" :key="s">
                        <button @click="allEditModal.f.status = s; allEditModal.dirty = true"
                                :class="allEditModal.f.status === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                                class="flex-1 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- 観点セクション -->
          <div class="space-y-3">
            <p class="text-xs font-medium text-gray-400">観点</p>
            <template x-for="(ps, i) in allEditModal.perspectives" :key="ps.label">
              <div class="border border-gray-100 rounded-xl p-4 space-y-3">
                <div class="flex items-center justify-between">
                  <p class="text-sm font-medium text-gray-700" x-text="ps.label"></p>
                  <div class="flex gap-1.5">
                    <template x-for="s in ['完了', '未確認', '該当なし']" :key="s">
                      <button @click="allEditModal.perspectives[i].status = s; allEditModal.dirty = true"
                              :class="{
                                'bg-green-50 text-green-700 border-green-300': allEditModal.perspectives[i].status === s && s === '完了',
                                'bg-yellow-50 text-yellow-700 border-yellow-300': allEditModal.perspectives[i].status === s && s === '未確認',
                                'bg-gray-100 text-gray-600 border-gray-300': allEditModal.perspectives[i].status === s && s === '該当なし',
                                'bg-white text-gray-400 border-gray-200': allEditModal.perspectives[i].status !== s
                              }"
                              class="px-2.5 py-1 text-xs border rounded-lg font-medium" x-text="s"></button>
                    </template>
                  </div>
                </div>
                <textarea x-model="allEditModal.perspectives[i].content" @input="allEditModal.dirty = true"
                          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm leading-relaxed resize-none focus:outline-none focus:border-blue-400"
                          rows="3" placeholder="内容を入力（任意）"></textarea>
              </div>
            </template>
          </div>

          <!-- メモセクション -->
          <div class="space-y-2">
            <p class="text-xs font-medium text-gray-400">メモ</p>
            <textarea x-model="allEditModal.memo" @input="allEditModal.dirty = true"
                      class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm leading-relaxed resize-none focus:outline-none focus:border-blue-400"
                      rows="3" placeholder="メモを入力（任意）"></textarea>
          </div>

          <p x-show="allEditModal.error" class="text-red-600 text-sm" x-text="allEditModal.error"></p>
        </div>

        <div class="px-5 pb-5 pt-3 border-t shrink-0 flex items-center justify-between gap-2">
          <button @click="deleteItem()" :disabled="allEditModal.deleting"
                  class="px-4 py-2 text-sm text-red-500 hover:text-red-700 font-medium disabled:opacity-50">
            <span x-show="!allEditModal.deleting">削除</span>
            <span x-show="allEditModal.deleting">削除中...</span>
          </button>
          <div class="flex items-center gap-2">
            <button @click="closeAllEditModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
            <button @click="saveAllEdit()" :disabled="allEditModal.saving"
                    class="px-5 py-2 text-sm bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
              <span x-show="!allEditModal.saving">保存</span>
              <span x-show="allEditModal.saving">保存中...</span>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- メモ編集モーダル -->
    <div x-show="memoModal.open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="display:none">
      <div class="absolute inset-0 bg-black/40" @click="closeMemoModal()"></div>
      <div class="relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg mx-0 sm:mx-4 shadow-xl" @click.stop>
        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b">
          <p class="font-medium">メモを編集</p>
          <button @click="closeMemoModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-5 py-4 space-y-4">
          <textarea x-model="memoModal.content" @input="memoModal.dirty = true"
                    class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm leading-relaxed resize-none focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
                    rows="6" placeholder="メモを入力（任意）"></textarea>
          <p x-show="memoModal.error" class="text-red-600 text-sm" x-text="memoModal.error"></p>
        </div>
        <div class="flex items-center justify-end gap-2 px-5 pb-5 pt-2">
          <button @click="closeMemoModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
          <button @click="saveMemoModal()" :disabled="memoModal.saving"
                  class="px-5 py-2 text-sm bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
            <span x-show="!memoModal.saving">保存</span>
            <span x-show="memoModal.saving">保存中...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 観点編集モーダル -->
    <div x-show="perspectiveModal.open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="display:none">
      <div class="absolute inset-0 bg-black/40" @click="closePerspectiveModal()"></div>
      <div class="relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg mx-0 sm:mx-4 shadow-xl" @click.stop>
        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b">
          <p class="font-medium" x-text="perspectiveModal.label + ' を編集'"></p>
          <button @click="closePerspectiveModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-5 py-4 space-y-4">
          <div>
            <p class="text-xs text-gray-500 mb-2">状態</p>
            <div class="flex gap-2">
              <button @click="perspectiveModal.status = '完了'; perspectiveModal.dirty = true"
                      :class="perspectiveModal.status === '完了' ? 'bg-green-50 text-green-700 border-green-300' : 'bg-white text-gray-500 border-gray-200'"
                      class="flex-1 py-2 text-sm border rounded-lg font-medium">✓ 完了</button>
              <button @click="perspectiveModal.status = '未確認'; perspectiveModal.dirty = true"
                      :class="perspectiveModal.status === '未確認' ? 'bg-yellow-50 text-yellow-700 border-yellow-300' : 'bg-white text-gray-500 border-gray-200'"
                      class="flex-1 py-2 text-sm border rounded-lg font-medium">△ 未確認</button>
              <button @click="perspectiveModal.status = '該当なし'; perspectiveModal.dirty = true"
                      :class="perspectiveModal.status === '該当なし' ? 'bg-gray-100 text-gray-600 border-gray-300' : 'bg-white text-gray-500 border-gray-200'"
                      class="flex-1 py-2 text-sm border rounded-lg font-medium">— 該当なし</button>
            </div>
          </div>
          <div>
            <p class="text-xs text-gray-500 mb-2">中身</p>
            <textarea x-model="perspectiveModal.content" @input="perspectiveModal.dirty = true"
                      class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm leading-relaxed resize-none focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
                      rows="5" placeholder="内容を入力（任意）"></textarea>
          </div>
          <p x-show="perspectiveModal.error" class="text-red-600 text-sm" x-text="perspectiveModal.error"></p>
        </div>
        <div class="flex items-center justify-end gap-2 px-5 pb-5 pt-2">
          <button @click="closePerspectiveModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
          <button @click="savePerspective()" :disabled="perspectiveModal.saving"
                  class="px-5 py-2 text-sm bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
            <span x-show="!perspectiveModal.saving">保存</span>
            <span x-show="perspectiveModal.saving">保存中...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 基本情報編集モーダル -->
    <div x-show="infoModal.open" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="display:none">
      <div class="absolute inset-0 bg-black/40" @click="closeInfoModal()"></div>
      <div class="relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg mx-0 sm:mx-4 shadow-xl max-h-[90vh] flex flex-col" @click.stop>

        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b shrink-0">
          <p class="font-medium">基本情報を編集</p>
          <button @click="closeInfoModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="px-5 py-4 space-y-4 overflow-y-auto flex-1">

          <!-- cash_flow フォーム -->
          <template x-if="sheetKey === 'cash_flow'">
            <div class="space-y-4">
              <div>
                <label class="text-xs text-gray-500 block mb-1">サービス名</label>
                <input type="text" x-model="infoModal.f.service_name" @input="infoModal.dirty = true"
                       class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"/>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">種別</label>
                <select x-model="infoModal.f.service_category" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option>サブスク</option><option>サブスク（動画配信）</option><option>公共料金</option>
                  <option>公共料金（電気）</option><option>通信費</option><option>メディア（NHK・新聞）</option>
                  <option>保険</option><option>税金</option><option>年金</option><option>その他</option>
                </select>
              </div>
              <div class="flex gap-3">
                <div class="flex-1">
                  <label class="text-xs text-gray-500 block mb-1">金額</label>
                  <input type="number" x-model="infoModal.f.billing_amount" @input="infoModal.dirty = true"
                         class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
                         placeholder="1490"/>
                </div>
                <div class="w-32">
                  <label class="text-xs text-gray-500 block mb-1">請求サイクル</label>
                  <select x-model="infoModal.f.billing_cycle" @change="infoModal.dirty = true"
                          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                    <option>月額</option>
                    <option>年額</option>
                    <option>隔月</option>
                    <option>その他</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">プラン（任意）</label>
                <input type="text" x-model="infoModal.f.plan" @input="infoModal.dirty = true"
                       class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400"
                       placeholder="家族プラン"/>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">契約者</label>
                <select x-model="infoModal.f.contract_holder_id" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option value="">（未設定）</option>
                  <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">状態</label>
                <div class="flex gap-2">
                  <template x-for="s in ['継続中', '解約予定', '解約済']" :key="s">
                    <button @click="infoModal.f.status = s; infoModal.dirty = true"
                            :class="infoModal.f.status === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                            class="flex-1 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- bank_account フォーム -->
          <template x-if="sheetKey === 'bank_account'">
            <div class="space-y-4">
              <div class="flex gap-3">
                <div class="flex-1">
                  <label class="text-xs text-gray-500 block mb-1">銀行名</label>
                  <input type="text" x-model="infoModal.f.bank_name" @input="infoModal.dirty = true"
                         class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                </div>
                <div class="flex-1">
                  <label class="text-xs text-gray-500 block mb-1">支店名</label>
                  <input type="text" x-model="infoModal.f.branch_name" @input="infoModal.dirty = true"
                         class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
                </div>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">口座種別</label>
                <select x-model="infoModal.f.account_type" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option>普通預金</option><option>定期預金</option><option>貯蓄預金</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">名義人</label>
                <select x-model="infoModal.f.account_holder_id" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option value="">（未設定）</option>
                  <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">状態</label>
                <div class="flex gap-2 flex-wrap">
                  <template x-for="s in ['メイン', 'サブ', '休眠', '解約予定']" :key="s">
                    <button @click="infoModal.f.account_status = s; infoModal.dirty = true"
                            :class="infoModal.f.account_status === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                            class="px-3 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                  </template>
                </div>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">ネットバンキング</label>
                <div class="flex gap-2">
                  <template x-for="s in ['利用中', '登録のみ', '未利用']" :key="s">
                    <button @click="infoModal.f.net_banking_usage = s; infoModal.dirty = true"
                            :class="infoModal.f.net_banking_usage === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                            class="flex-1 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- insurance フォーム -->
          <template x-if="sheetKey === 'insurance'">
            <div class="space-y-4">
              <div>
                <label class="text-xs text-gray-500 block mb-1">保険会社</label>
                <input type="text" x-model="infoModal.f.insurance_company" @input="infoModal.dirty = true"
                       class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">商品名</label>
                <input type="text" x-model="infoModal.f.product_name" @input="infoModal.dirty = true"
                       class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">保険種別</label>
                <select x-model="infoModal.f.insurance_type" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option>生命</option><option>医療</option><option>がん</option>
                  <option>個人年金</option><option>火災・地震</option><option>自動車</option><option>その他</option>
                </select>
              </div>
              <div class="flex gap-3">
                <div class="flex-1">
                  <label class="text-xs text-gray-500 block mb-1">契約者</label>
                  <select x-model="infoModal.f.contract_holder_id" @change="infoModal.dirty = true"
                          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                    <option value="">（未設定）</option>
                    <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                  </select>
                </div>
                <div class="flex-1">
                  <label class="text-xs text-gray-500 block mb-1">被保険者</label>
                  <select x-model="infoModal.f.insured_person_id" @change="infoModal.dirty = true"
                          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                    <option value="">（未設定）</option>
                    <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                  </select>
                </div>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">受取人</label>
                <select x-model="infoModal.f.beneficiary_id" @change="infoModal.dirty = true"
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white">
                  <option value="">（未設定）</option>
                  <template x-for="m in familyMembers" :key="m.id"><option :value="m.display_name" x-text="m.display_name"></option></template>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">払込状況</label>
                <div class="flex gap-2">
                  <template x-for="s in ['払込中', '払込済', '失効']" :key="s">
                    <button @click="infoModal.f.payment_status = s; infoModal.dirty = true"
                            :class="infoModal.f.payment_status === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                            class="flex-1 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                  </template>
                </div>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">状態</label>
                <div class="flex gap-2 flex-wrap">
                  <template x-for="s in ['継続中', '解約予定', '解約済', '失効']" :key="s">
                    <button @click="infoModal.f.account_status = s; infoModal.dirty = true"
                            :class="infoModal.f.account_status === s ? 'bg-blue-50 text-blue-700 border-blue-300' : 'bg-white text-gray-500 border-gray-200'"
                            class="px-3 py-2 text-sm border rounded-lg font-medium" x-text="s"></button>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <p x-show="infoModal.error" class="text-red-600 text-sm" x-text="infoModal.error"></p>
        </div>

        <div class="flex items-center justify-end gap-2 px-5 pb-5 pt-3 border-t shrink-0">
          <button @click="closeInfoModal()" class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
          <button @click="saveInfoModal()" :disabled="infoModal.saving"
                  class="px-5 py-2 text-sm bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
            <span x-show="!infoModal.saving">保存</span>
            <span x-show="infoModal.saving">保存中...</span>
          </button>
        </div>

      </div>
    </div>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs mt-0.5">ホーム</span>
      </a>
      <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        <span class="text-xs mt-0.5">全項目</span>
      </a>
    </nav>

  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
