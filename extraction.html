<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 明細の確認</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    // transaction_candidates のカラム順（setup.html と一致させる）
    const CANDIDATE_COLS = [
      'id', 'upload_id', 'service_name', 'raw_description',
      'monthly_amount', 'billing_cycle', 'category_guess', 'status', 'registered_to'
    ];

    // 種別の選択肢
    const CATEGORY_OPTIONS = [
      'サブスク', 'サブスク（動画配信）', '公共料金', '公共料金（電気）',
      '通信費', 'メディア（NHK・新聞）', '保険', '税金', '年金', 'その他'
    ];

    const CYCLE_OPTIONS = ['月額', '年額', '隔月', 'その他'];

    function extractionApp() {
      return {
        loading: true,
        error: null,
        candidates: [],
        cycleOptions: CYCLE_OPTIONS,

        async init() {
          await waitForGsi();
          initAuth(
            () => this.load(),
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          try {
            const rows = await getSheet('transaction_candidates');
            this.candidates = rows
              .filter(r => (r.status || '未登録') === '未登録')
              .map(r => ({
                _row: r._row,
                id: r.id,
                upload_id: r.upload_id,
                service_name: r.service_name || '',
                raw_description: r.raw_description || '',
                monthly_amount: r.monthly_amount || '',
                billing_cycle: r.billing_cycle || '月額',
                category: r.category_guess || 'その他',
                busy: false,
                error: null
              }));
          } catch (e) {
            this.error = e.message;
          }
          this.loading = false;
        },

        categoryOptions(cand) {
          // 推定値がリストになければ先頭に足す
          if (cand.category && !CATEGORY_OPTIONS.includes(cand.category)) {
            return [cand.category, ...CATEGORY_OPTIONS];
          }
          return CATEGORY_OPTIONS;
        },

        formatAmount(cand) {
          if (!cand.monthly_amount) return '';
          const num = Number(cand.monthly_amount).toLocaleString();
          const cycle = CYCLE_SHORT[cand.billing_cycle] ?? cand.billing_cycle ?? '月';
          return `¥${num}/${cycle}`;
        },

        _candidateRow(cand, status, registeredTo) {
          return {
            id: cand.id,
            upload_id: cand.upload_id,
            service_name: cand.service_name,
            raw_description: cand.raw_description,
            monthly_amount: cand.monthly_amount,
            billing_cycle: cand.billing_cycle,
            category_guess: cand.category,
            status,
            registered_to: registeredTo || ''
          };
        },

        async register(cand) {
          cand.busy = true;
          cand.error = null;
          try {
            const newId = 'cash_' + Date.now();
            const today = new Date().toISOString().slice(0, 10);
            const cashRow = {
              id: newId,
              created_at: today,
              updated_at: today,
              q1_existence_status: '完了',
              q1_existence_content: '明細から自動検出',
              q2_understanding_status: '未確認',
              q3_access_status: '未確認',
              q4_emergency_status: '未確認',
              free_memo: '',
              service_name: cand.service_name,
              service_category: cand.category,
              cash_flow_type: '支出',
              billing_cycle: cand.billing_cycle,
              billing_amount: cand.monthly_amount,
              monthly_amount: cand.billing_cycle === '月額' ? cand.monthly_amount : '',
              status: '継続中',
              input_source: '明細',
              source_transaction_id: cand.id
            };
            await appendObj('cash_flow', cashRow, getAllCols('cash_flow'));
            await updateRow('transaction_candidates', cand._row,
              toRow(this._candidateRow(cand, '登録済', newId), CANDIDATE_COLS));
            this.candidates = this.candidates.filter(c => c._row !== cand._row);
          } catch (e) {
            cand.error = e.message;
            cand.busy = false;
          }
        },

        async skip(cand) {
          cand.busy = true;
          cand.error = null;
          try {
            await updateRow('transaction_candidates', cand._row,
              toRow(this._candidateRow(cand, 'スキップ', ''), CANDIDATE_COLS));
            this.candidates = this.candidates.filter(c => c._row !== cand._row);
          } catch (e) {
            cand.error = e.message;
            cand.busy = false;
          }
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="extractionApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
      <a href="dashboard.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <p class="font-medium flex-1">明細の確認</p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4">

      <!-- ヘッダー -->
      <div class="pt-2 mb-4">
        <p class="text-sm text-gray-500">明細から検出された定期支払い</p>
        <p class="text-lg font-medium" x-text="candidates.length + '件の未登録'"></p>
      </div>

      <!-- 空状態 -->
      <div x-show="candidates.length === 0" class="text-center py-16 text-gray-400 text-sm">
        <p class="mb-1">確認待ちの候補はありません</p>
        <p class="text-xs">明細をアップロードして解析すると、ここに定期支払いが表示されます</p>
      </div>

      <!-- 候補リスト -->
      <div class="space-y-3">
        <template x-for="cand in candidates" :key="cand._row">
          <div class="bg-white rounded-xl p-4 shadow-sm">
            <!-- 1行目：サービス名 + 金額 -->
            <div class="flex items-center justify-between mb-1">
              <div class="flex items-center gap-2 min-w-0">
                <span class="text-xs text-blue-700 bg-blue-100 px-2 py-0.5 rounded font-medium shrink-0">AI推定</span>
                <input type="text" x-model="cand.service_name"
                       class="font-medium bg-transparent border-b border-gray-300 hover:border-gray-400 focus:border-blue-400 focus:outline-none w-full min-w-0"
                       placeholder="サービス名"/>
              </div>
              <p class="text-sm font-bold text-gray-800 shrink-0 ml-2" x-text="formatAmount(cand)"></p>
            </div>
            <!-- 生の摘要 -->
            <p class="text-xs text-gray-400 mb-3" x-text="'明細摘要：' + cand.raw_description"></p>
            <!-- 種別・サイクル -->
            <div class="flex gap-2 mb-3">
              <div class="flex-1">
                <label class="text-xs text-gray-500 block mb-1">種別</label>
                <select x-model="cand.category"
                        class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-white focus:outline-none focus:border-blue-400">
                  <template x-for="opt in categoryOptions(cand)" :key="opt">
                    <option :value="opt" x-text="opt"></option>
                  </template>
                </select>
              </div>
              <div class="w-28">
                <label class="text-xs text-gray-500 block mb-1">サイクル</label>
                <select x-model="cand.billing_cycle"
                        class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-white focus:outline-none focus:border-blue-400">
                  <template x-for="opt in cycleOptions" :key="opt">
                    <option :value="opt" x-text="opt"></option>
                  </template>
                </select>
              </div>
            </div>
            <!-- エラー -->
            <p x-show="cand.error" class="text-red-600 text-xs mb-2" x-text="cand.error"></p>
            <!-- アクション -->
            <div class="flex gap-2">
              <button @click="register(cand)" :disabled="cand.busy"
                      class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50">
                <span x-show="!cand.busy">登録する</span>
                <span x-show="cand.busy">処理中...</span>
              </button>
              <button @click="skip(cand)" :disabled="cand.busy"
                      class="px-4 py-1.5 text-sm bg-white border border-gray-200 text-gray-500 rounded-lg font-medium hover:bg-gray-50 disabled:opacity-50">
                スキップ
              </button>
            </div>
          </div>
        </template>
      </div>

    </div>

    <!-- Bottom nav -->
    <div x-data="{ showGroups: false }">

      <!-- グループ選択シート -->
      <div x-show="showGroups"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-2"
           @click="showGroups = false"
           class="fixed inset-0 z-40">
        <div @click.stop
             class="fixed bottom-14 left-0 right-0 bg-white border-t rounded-t-2xl shadow-2xl z-50 p-4">
          <p class="text-xs text-gray-400 text-center mb-3 font-medium">グループ</p>
          <div class="grid grid-cols-2 gap-2">
            <a href="item-list.html?group=%E6%94%AF%E5%87%BA%E3%83%BB%E5%8F%8E%E5%85%A5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">支出・収入</a>
            <a href="item-list.html?group=%E8%B3%87%E7%94%A3%E3%83%BB%E8%B2%A0%E5%82%B5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">資産・負債</a>
            <a href="item-list.html?group=%E3%82%82%E3%81%97%E3%82%82%E3%81%AE%E6%99%82"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">もしもの時</a>
            <a href="item-list.html?group=%E3%81%AE%E3%81%93%E3%81%99%E3%82%82%E3%81%AE"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">のこすもの</a>
          </div>
        </div>
      </div>

      <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex z-30">
        <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-xs mt-0.5">ダッシュボード</span>
        </a>
        <button @click="showGroups = !showGroups"
                class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
          <span class="text-xs mt-0.5">グループ</span>
        </button>
        <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          <span class="text-xs mt-0.5">全項目</span>
        </a>
        <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="text-xs mt-0.5">設定</span>
        </a>
      </nav>
    </div>

  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
