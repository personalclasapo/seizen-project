<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://accounts.google.com">
  <link rel="preconnect" href="https://sheets.googleapis.com">
  <link rel="preconnect" href="https://www.googleapis.com">
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/schema.js"></script>
  <script>
    function dashboardApp() {
      return {
        loading: true,
        error: null,
        overallPct: 0,
        stats: { total: 0, done: 0, inProgress: 0, todo: 0 },
        groups: GROUPS.map(g => ({ ...g, done: 0, total: 0, pct: 0 })),
        pendingCandidates: 0,

        userEmail: '',

        async init() {
          await waitForGsi();
          initAuth(
            () => {
              fetchUserEmail().then(e => { this.userEmail = e; });
              this.load();
            },
            () => { window.location.href = 'index.html'; }
          );
        },

        async load() {
          if (!getSpreadsheetId()) {
            window.location.href = 'setup.html';
            return;
          }

          // 全グループの全シートを集計対象にする（重複シートは排除）
          const sheetKeys = [...new Set(GROUPS.flatMap(g => g.sheets))];
          const results = await Promise.allSettled([
            ...sheetKeys.map(k => getSheet(k)),
            getSheet('transaction_candidates')
          ]);
          const candResult = results[results.length - 1];

          // 取得できたシートだけ sheetKey -> rows に格納（未作成シートはスキップ）
          const rowsByKey = {};
          let anyOk = false;
          sheetKeys.forEach((k, i) => {
            if (results[i].status === 'fulfilled') { rowsByKey[k] = results[i].value; anyOk = true; }
          });
          if (!anyOk) this.error = results[0]?.reason?.message || null;

          // 1項目 = perspectiveMax(sheetKey) ポイント満点として観点ベースで集計する。
          // noPerspectives シート（max 1）も同じロジックで正しく扱える。
          let totalItems = 0, doneItems = 0, inProgressItems = 0, todoItems = 0;
          let donePoints = 0, possiblePoints = 0;

          this.groups = GROUPS.map(g => {
            let gTotal = 0, gDone = 0;
            for (const key of g.sheets) {
              const rows = rowsByKey[key];
              if (!rows) continue;
              const max = perspectiveMax(key);
              for (const r of rows) {
                const d = doneCount(r, key);
                gTotal++; totalItems++;
                donePoints += d; possiblePoints += max;
                if (d >= max) { gDone++; doneItems++; }
                else if (d > 0) inProgressItems++;
                else todoItems++;
              }
            }
            return { ...g, done: gDone, total: gTotal, pct: gTotal ? Math.round(gDone / gTotal * 100) : 0 };
          });

          this.stats = { total: totalItems, done: doneItems, inProgress: inProgressItems, todo: todoItems };
          this.overallPct = possiblePoints ? Math.round(donePoints / possiblePoints * 100) : 0;

          if (candResult.status === 'fulfilled') {
            this.pendingCandidates = candResult.value.filter(r => (r.status || '未登録') === '未登録').length;
          }
          this.loading = false;
        },

        groupLink(group) {
          if (group.sheets.length === 0) return null;
          return `item-list.html?group=${encodeURIComponent(group.label)}`;
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="dashboardApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10">
      <p class="font-medium">生前整理</p>
      <div class="flex items-center gap-2 min-w-0">
        <span class="text-xs text-gray-400 truncate" x-text="userEmail"></span>
        <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600 shrink-0">ログアウト</button>
      </div>
    </nav>

    <!-- Loading -->
    <div x-show="loading" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <!-- Error -->
    <div x-show="!loading && error" class="max-w-3xl mx-auto p-4">
      <div class="bg-red-50 text-red-700 rounded-lg p-4 text-sm" x-text="error"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading && !error" class="max-w-3xl mx-auto p-4 space-y-4">

      <div class="pt-2">
        <p class="text-sm text-gray-500">家族で進める生前整理</p>
      </div>

      <!-- 明細から登録（未登録候補あり） -->
      <a x-show="pendingCandidates > 0" href="extraction.html"
         class="flex items-center justify-between bg-[#4A7C59]/10 border border-[#4A7C59]/20 rounded-xl p-4 hover:bg-[#4A7C59]/20 transition-colors">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-[#4A7C59] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <div>
            <p class="text-sm font-medium text-[#3A6347]">明細から登録できる項目があります</p>
            <p class="text-xs text-[#4A7C59]" x-text="pendingCandidates + '件の定期支払いを確認'"></p>
          </div>
        </div>
        <svg class="w-4 h-4 text-[#4A7C59] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </a>

      <!-- 明細をアップロード（常時表示） -->
      <a href="upload.html"
         class="flex items-center justify-between bg-white border-2 border-[#4A7C59]/40 text-[#4A7C59] rounded-xl p-4 hover:bg-[#4A7C59]/10 transition-colors">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <p class="text-sm font-medium">明細をアップロード</p>
        </div>
        <svg class="w-4 h-4 text-[#4A7C59] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </a>

      <!-- 全体進捗 -->
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <span class="text-sm text-gray-500">進行状況</span>
          <span class="text-sm font-medium" x-text="overallPct + '%'"></span>
        </div>
        <div class="bg-gray-100 h-2 rounded-full overflow-hidden mb-4">
          <div class="bg-[#4A7C59] h-full rounded-full transition-all duration-500"
               :style="'width:' + overallPct + '%'"></div>
        </div>
        <div class="grid grid-cols-4 gap-2 text-center">
          <div>
            <p class="text-2xl font-medium" x-text="stats.total"></p>
            <p class="text-xs text-gray-400">項目数</p>
          </div>
          <div>
            <p class="text-2xl font-medium text-green-600" x-text="stats.done"></p>
            <p class="text-xs text-gray-400">完了</p>
          </div>
          <div>
            <p class="text-2xl font-medium text-yellow-500" x-text="stats.inProgress"></p>
            <p class="text-xs text-gray-400">進行中</p>
          </div>
          <div>
            <p class="text-2xl font-medium text-gray-400" x-text="stats.todo"></p>
            <p class="text-xs text-gray-400">未着手</p>
          </div>
        </div>
      </div>

      <!-- 4グループ -->
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <p class="font-medium mb-3">4つのグループ</p>
        <div class="space-y-2">
          <template x-for="(group, i) in groups" :key="i">
            <div>
              <template x-if="groupLink(group)">
                <a :href="groupLink(group)"
                   class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                  <span class="text-sm" x-text="group.label"></span>
                  <div class="flex items-center gap-3">
                    <div class="w-16 bg-gray-200 h-1 rounded-full overflow-hidden">
                      <div class="bg-[#4A7C59] h-full" :style="'width:' + group.pct + '%'"></div>
                    </div>
                    <span class="text-xs text-gray-400 w-8 text-right"
                          x-text="group.done + '/' + group.total"></span>
                  </div>
                </a>
              </template>
              <template x-if="!groupLink(group)">
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg opacity-40">
                  <span class="text-sm" x-text="group.label"></span>
                  <span class="text-xs text-gray-400">準備中</span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>

    </div>
  </div>

    <!-- Bottom nav -->
    <div x-data="{ showGroups: false }">

      <!-- グループ選択シート -->
      <div x-show="showGroups"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 translate-y-0"
           x-transition:leave-end="opacity-0 translate-y-2"
           @click="showGroups = false"
           class="fixed inset-0 z-40">
        <div @click.stop
             class="fixed bottom-14 left-0 right-0 bg-white border-t rounded-t-2xl shadow-2xl z-50 p-4">
          <p class="text-xs text-gray-400 text-center mb-3 font-medium">グループ</p>
          <div class="grid grid-cols-2 gap-2">
            <a href="item-list.html?group=%E6%94%AF%E5%87%BA%E3%83%BB%E5%8F%8E%E5%85%A5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">支出・収入</a>
            <a href="item-list.html?group=%E8%B3%87%E7%94%A3%E3%83%BB%E8%B2%A0%E5%82%B5"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">資産・負債</a>
            <a href="item-list.html?group=%E3%82%82%E3%81%97%E3%82%82%E3%81%AE%E6%99%82"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">もしもの時</a>
            <a href="item-list.html?group=%E3%81%AE%E3%81%93%E3%81%99%E3%82%82%E3%81%AE"
               class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">のこすもの</a>
          </div>
        </div>
      </div>

      <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex z-30">
        <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-[#4A7C59] hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-xs mt-0.5">ダッシュボード</span>
        </a>
        <button @click="showGroups = !showGroups"
                class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
          <span class="text-xs mt-0.5">グループ</span>
        </button>
        <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          <span class="text-xs mt-0.5">全項目</span>
        </a>
        <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="text-xs mt-0.5">設定</span>
        </a>
      </nav>
    </div>

  <!-- Scroll to top button -->
  <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"
    style="display:none"
    class="fixed bottom-20 right-4 z-50 w-10 h-10 rounded-full bg-white border-2 border-gray-300 text-gray-600 shadow-md flex items-center justify-center"
    aria-label="トップへ戻る">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
    </svg>
  </button>
  <script>
    (function() {
      var btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', function() {
        btn.style.display = window.scrollY >= 300 ? 'flex' : 'none';
      }, {passive: true});
    })();
  </script>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
