<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 設定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script>
    const FM_COLS = ['id', 'display_name', 'role', 'note', 'color'];

    const COLOR_OPTIONS = [
      { key: 'blue',   dot: 'bg-blue-400'   },
      { key: 'rose',   dot: 'bg-rose-400'   },
      { key: 'green',  dot: 'bg-green-500'  },
      { key: 'amber',  dot: 'bg-amber-400'  },
      { key: 'purple', dot: 'bg-purple-400' },
      { key: 'teal',   dot: 'bg-teal-400'   },
      { key: 'orange', dot: 'bg-orange-400' },
      { key: 'indigo', dot: 'bg-indigo-400' },
    ];

    function settingsApp() {
      return {
        ready: false,
        error: null,
        spreadsheetId: '',

        members: [],
        membersLoading: false,
        memberError: null,
        savingColorIdx: -1,
        newMemberName: '',
        newMemberColor: 'blue',
        colorOptions: COLOR_OPTIONS,

        editingIdx: -1,
        editingName: '',

        colorDot(colorKey) {
          const map = {
            blue: 'bg-blue-400', rose: 'bg-rose-400', green: 'bg-green-500',
            amber: 'bg-amber-400', purple: 'bg-purple-400', teal: 'bg-teal-400',
            orange: 'bg-orange-400', indigo: 'bg-indigo-400',
          };
          return map[colorKey] || 'bg-gray-300';
        },

        async init() {
          await waitForGsi();
          initAuth(
            async () => {
              this.spreadsheetId = getSpreadsheetId();
              this.ready = true;
              if (this.spreadsheetId) await this.loadMembers();
            },
            () => { window.location.href = 'index.html'; }
          );
        },

        async loadMembers() {
          if (!this.spreadsheetId) return;
          this.membersLoading = true;
          try {
            // 旧バージョンで作成されたシートには color 列が無いことがあるため、
            // ヘッダーに不足列があれば補完してから読み込む
            await ensureHeader('family_member', FM_COLS);
            this.members = await getSheet('family_member');
          } catch {
            this.members = [];
          }
          this.membersLoading = false;
        },

        async addMember() {
          const name = this.newMemberName.trim();
          if (!name) return;
          this.memberError = null;
          const id = 'fm_' + Date.now();
          const color = this.newMemberColor || 'blue';
          try {
            await appendRow('family_member', toRow({ id, display_name: name, role: '', note: '', color }, FM_COLS));
            this.newMemberName = '';
            this.newMemberColor = 'blue';
            this.members = await getSheet('family_member');
          } catch (e) {
            this.memberError = e.message;
          }
        },

        async deleteMember(idx) {
          const m = this.members[idx];
          if (!m?._row) return;
          this.memberError = null;
          try {
            await deleteRow('family_member', m._row);
            this.members = await getSheet('family_member');
          } catch (e) {
            this.memberError = e.message;
          }
        },

        async setMemberColor(idx, colorKey) {
          const m = this.members[idx];
          if (!m || m.color === colorKey) return;
          const prev = m.color;
          // splice で置き換えることで Alpine.js のリアクティビティを確実に発火させる
          this.members.splice(idx, 1, { ...m, color: colorKey });
          this.savingColorIdx = idx;
          this.memberError = null;
          try {
            await updateRow('family_member', m._row, toRow(
              { id: m.id, display_name: m.display_name, role: m.role || '', note: m.note || '', color: colorKey },
              FM_COLS
            ));
          } catch (e) {
            this.members.splice(idx, 1, { ...this.members[idx], color: prev });
            this.memberError = e.message;
          } finally {
            this.savingColorIdx = -1;
          }
        },

        startEdit(idx) {
          this.editingIdx = idx;
          this.editingName = this.members[idx].display_name;
        },

        cancelEdit() {
          this.editingIdx = -1;
          this.editingName = '';
        },

        async saveMemberName(idx) {
          const name = this.editingName.trim();
          if (!name) { this.cancelEdit(); return; }
          const m = this.members[idx];
          if (name === m.display_name) { this.cancelEdit(); return; }
          const prev = m.display_name;
          this.members.splice(idx, 1, { ...m, display_name: name });
          this.editingIdx = -1;
          this.memberError = null;
          try {
            await updateRow('family_member', m._row, toRow(
              { id: m.id, display_name: name, role: m.role || '', note: m.note || '', color: m.color || '' },
              FM_COLS
            ));
          } catch (e) {
            this.members.splice(idx, 1, { ...this.members[idx], display_name: prev });
            this.memberError = e.message;
          }
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen pb-16">

  <div x-data="settingsApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10">
      <p class="font-medium">設定</p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <div x-show="!ready" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <div x-show="ready" class="max-w-lg mx-auto p-4 space-y-4">

      <!-- エラー -->
      <div x-show="error" class="bg-red-50 text-red-700 rounded-lg p-3 text-sm" x-text="error"></div>

      <!-- 家族メンバー -->
      <div x-show="spreadsheetId" class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <p class="text-sm font-medium">家族メンバー</p>
          <span x-show="membersLoading" class="text-xs text-gray-400">読み込み中...</span>
        </div>

        <!-- メンバー一覧 -->
        <div class="space-y-3 mb-4" x-show="!membersLoading">
          <p x-show="members.length === 0" class="text-sm text-gray-400">メンバーがいません</p>
          <template x-for="(m, idx) in members" :key="m.id || idx">
            <div class="rounded-lg border border-gray-100 p-3 space-y-2">

              <!-- 名前行 -->
              <div class="flex items-center gap-2">
                <!-- 現在色ドット -->
                <div :class="colorDot(m.color)" class="w-4 h-4 rounded-full shrink-0"></div>

                <!-- 名前（通常 / 編集中） -->
                <div class="flex items-center gap-1 flex-1 min-w-0">
                  <template x-if="editingIdx !== idx">
                    <div class="flex items-center gap-1 min-w-0">
                      <span class="text-sm font-medium truncate" x-text="m.display_name"></span>
                      <button @click="startEdit(idx)" class="text-gray-300 hover:text-gray-500 shrink-0 p-0.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                      </button>
                    </div>
                  </template>
                  <template x-if="editingIdx === idx">
                    <div class="flex items-center gap-1 flex-1 min-w-0">
                      <input type="text" x-model="editingName"
                             x-init="$nextTick(() => $el.focus())"
                             @keydown.enter="if (!$event.isComposing) saveMemberName(idx)"
                             @keydown.escape="cancelEdit()"
                             class="flex-1 min-w-0 text-sm border border-blue-300 rounded-lg px-2 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-300">
                      <button @click="saveMemberName(idx)" class="text-blue-600 hover:text-blue-800 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                      </button>
                      <button @click="cancelEdit()" class="text-gray-400 hover:text-gray-600 shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                      </button>
                    </div>
                  </template>
                </div>

                <!-- 削除 -->
                <button @click="deleteMember(idx)"
                        class="text-xs text-gray-400 hover:text-red-500 px-1 shrink-0">削除</button>
              </div>

              <!-- 色選択行 -->
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 shrink-0">カラー</span>
                <div class="flex gap-2 flex-1">
                  <template x-for="c in colorOptions" :key="c.key">
                    <button @click="setMemberColor(idx, c.key)"
                            :class="[c.dot, m.color === c.key ? 'ring-2 ring-offset-2 ring-gray-600 scale-110' : 'opacity-60 hover:opacity-100']"
                            class="w-7 h-7 rounded-full transition-all"
                            :title="c.key"></button>
                  </template>
                </div>
                <span x-show="savingColorIdx === idx" class="text-xs text-gray-400 shrink-0">保存中...</span>
                <span x-show="savingColorIdx !== idx && m.color" class="text-xs text-gray-400 shrink-0">タップで変更</span>
              </div>

            </div>
          </template>
        </div>

        <!-- 追加フォーム -->
        <div class="flex items-center gap-2 pt-3 border-t border-gray-100">
          <input type="text" x-model="newMemberName"
                 @keydown.enter="if (!$event.isComposing) addMember()"
                 placeholder="名前を入力"
                 class="flex-1 min-w-0 text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-300">
          <div class="flex gap-1.5 shrink-0">
            <template x-for="c in colorOptions" :key="c.key">
              <button @click="newMemberColor = c.key"
                      :class="[c.dot, newMemberColor === c.key ? 'ring-2 ring-offset-1 ring-gray-500 scale-110' : 'opacity-70 hover:opacity-100']"
                      class="w-6 h-6 rounded-full transition-all"></button>
            </template>
          </div>
          <button @click="addMember()"
                  :disabled="!newMemberName.trim()"
                  class="shrink-0 text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed">追加</button>
        </div>

        <p x-show="memberError" class="mt-2 text-xs text-red-500" x-text="memberError"></p>
      </div>


    </div>
  </div>

  <!-- Bottom nav -->
  <div x-data="{ showGroups: false }">

    <!-- グループ選択シート -->
    <div x-show="showGroups"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-2"
         @click="showGroups = false"
         class="fixed inset-0 z-40">
      <div @click.stop
           class="fixed bottom-14 left-0 right-0 bg-white border-t rounded-t-2xl shadow-2xl z-50 p-4">
        <p class="text-xs text-gray-400 text-center mb-3 font-medium">グループ</p>
        <div class="grid grid-cols-2 gap-2">
          <a href="item-list.html?group=%E6%94%AF%E5%87%BA%E3%83%BB%E5%8F%8E%E5%85%A5"
             class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">支出・収入</a>
          <a href="item-list.html?group=%E8%B3%87%E7%94%A3%E3%83%BB%E8%B2%A0%E5%82%B5"
             class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">資産・負債</a>
          <a href="item-list.html?group=%E3%82%82%E3%81%97%E3%82%82%E3%81%AE%E6%99%82"
             class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">もしもの時</a>
          <a href="item-list.html?group=%E3%81%AE%E3%81%93%E3%81%99%E3%82%82%E3%81%AE"
             class="flex items-center justify-center p-3 rounded-xl bg-[#FAF7F0] border border-[#E8E0D0] hover:bg-[#F0EAE0] text-sm font-medium text-gray-700">のこすもの</a>
        </div>
      </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex z-30">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs mt-0.5">ダッシュボード</span>
      </a>
      <button @click="showGroups = !showGroups"
              class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        <span class="text-xs mt-0.5">グループ</span>
      </button>
      <a href="all-items.html" class="flex-1 flex flex-col items-center py-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        <span class="text-xs mt-0.5">全項目</span>
      </a>
      <a href="settings.html" class="flex-1 flex flex-col items-center py-2 text-blue-600 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs mt-0.5">設定</span>
      </a>
    </nav>
  </div>

  <!-- Scroll to top button -->
  <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"
    style="display:none"
    class="fixed bottom-20 right-4 z-50 w-10 h-10 rounded-full bg-gray-200 text-gray-600 shadow-md flex items-center justify-center"
    aria-label="トップへ戻る">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
    </svg>
  </button>
  <script>
    (function() {
      var btn = document.getElementById('scrollTopBtn');
      window.addEventListener('scroll', function() {
        btn.style.display = window.scrollY >= 300 ? 'flex' : 'none';
      }, {passive: true});
    })();
  </script>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
