<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生前整理 - 設定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/picker.js"></script>
  <script>
    const FM_COLS = ['id', 'display_name', 'role', 'note', 'color'];

    const COLOR_OPTIONS = [
      { key: 'blue',   dot: 'bg-blue-400'   },
      { key: 'rose',   dot: 'bg-rose-400'   },
      { key: 'green',  dot: 'bg-green-500'  },
      { key: 'amber',  dot: 'bg-amber-400'  },
      { key: 'purple', dot: 'bg-purple-400' },
      { key: 'teal',   dot: 'bg-teal-400'   },
      { key: 'orange', dot: 'bg-orange-400' },
      { key: 'indigo', dot: 'bg-indigo-400' },
    ];

    function settingsApp() {
      return {
        ready: false,
        error: null,
        spreadsheetName: '',
        spreadsheetId: '',
        folderName: '',
        folderId: '',

        members: [],
        membersLoading: false,
        memberError: null,
        newMemberName: '',
        newMemberColor: 'blue',
        colorOptions: COLOR_OPTIONS,

        async init() {
          await waitForGsi();
          initAuth(
            async () => {
              this.spreadsheetId = getSpreadsheetId();
              this.spreadsheetName = getSpreadsheetName() || (this.spreadsheetId ? '（選択済み）' : '');
              this.folderId = getDriveFolderId();
              this.folderName = getDriveFolderName();
              this.ready = true;
              if (this.spreadsheetId) await this.loadMembers();
            },
            () => { window.location.href = 'index.html'; }
          );
        },

        get configured() {
          return !!this.spreadsheetId;
        },

        async chooseSpreadsheet() {
          this.error = null;
          try {
            const picked = await pickSpreadsheet();
            if (picked) {
              setSpreadsheetId(picked.id);
              setSpreadsheetName(picked.name);
              this.spreadsheetId = picked.id;
              this.spreadsheetName = picked.name;
              await this.loadMembers();
            }
          } catch (e) {
            this.error = e.message;
          }
        },

        async chooseFolder() {
          this.error = null;
          try {
            const picked = await pickFolder();
            if (picked) {
              setDriveFolderId(picked.id);
              setDriveFolderName(picked.name);
              this.folderId = picked.id;
              this.folderName = picked.name;
            }
          } catch (e) {
            this.error = e.message;
          }
        },

        async loadMembers() {
          if (!this.spreadsheetId) return;
          this.membersLoading = true;
          try {
            this.members = await getSheet('family_member');
          } catch {
            this.members = [];
          }
          this.membersLoading = false;
        },

        async addMember() {
          const name = this.newMemberName.trim();
          if (!name) return;
          this.memberError = null;
          const id = 'fm_' + Date.now();
          const color = this.newMemberColor || 'blue';
          try {
            await appendRow('family_member', toRow({ id, display_name: name, role: '', note: '', color }, FM_COLS));
            this.newMemberName = '';
            this.newMemberColor = 'blue';
            this.members = await getSheet('family_member');
          } catch (e) {
            this.memberError = e.message;
          }
        },

        async deleteMember(idx) {
          const m = this.members[idx];
          if (!m?._row) return;
          this.memberError = null;
          try {
            await deleteRow('family_member', m._row);
            this.members = await getSheet('family_member');
          } catch (e) {
            this.memberError = e.message;
          }
        },

        async setMemberColor(idx, colorKey) {
          const m = this.members[idx];
          if (!m || m.color === colorKey) return;
          const prev = m.color;
          m.color = colorKey;
          this.memberError = null;
          try {
            await updateRow('family_member', m._row, toRow(
              { id: m.id, display_name: m.display_name, role: m.role || '', note: m.note || '', color: colorKey },
              FM_COLS
            ));
          } catch (e) {
            m.color = prev;
            this.memberError = e.message;
          }
        }
      };
    }
  </script>
</head>
<body class="bg-[#FAF7F0] min-h-screen">

  <div x-data="settingsApp()" x-init="init()">

    <!-- Nav -->
    <nav class="bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-10">
      <p class="font-medium">設定</p>
      <button @click="signOut()" class="text-xs text-gray-400 hover:text-gray-600">ログアウト</button>
    </nav>

    <div x-show="!ready" class="flex items-center justify-center py-24 text-sm text-gray-400">読み込み中...</div>

    <div x-show="ready" class="max-w-lg mx-auto p-4 space-y-4">

      <div class="pt-2">
        <p class="text-sm text-gray-500 leading-relaxed">
          データを保存する場所を選びます。スプレッドシートと明細フォルダは、ご家族のGoogle Driveから選択してください。
        </p>
      </div>

      <!-- エラー -->
      <div x-show="error" class="bg-red-50 text-red-700 rounded-lg p-3 text-sm" x-text="error"></div>

      <!-- スプレッドシート -->
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <p class="text-sm font-medium">データ保存先（スプレッドシート）</p>
          <span x-show="spreadsheetId" class="text-xs text-green-700 bg-green-100 px-2 py-0.5 rounded">設定済み</span>
        </div>
        <p x-show="spreadsheetName" class="text-sm text-gray-700 truncate mb-3" x-text="spreadsheetName"></p>
        <p x-show="!spreadsheetName" class="text-sm text-gray-400 mb-3">未選択</p>
        <button @click="chooseSpreadsheet()"
                class="px-4 py-2 text-sm border border-gray-200 rounded-lg font-medium text-gray-600 hover:bg-gray-50"
                x-text="spreadsheetId ? 'スプレッドシートを変更' : 'スプレッドシートを選択'"></button>
      </div>

      <!-- 明細フォルダ -->
      <div class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <p class="text-sm font-medium">明細の保存フォルダ（任意）</p>
          <span x-show="folderId" class="text-xs text-green-700 bg-green-100 px-2 py-0.5 rounded">設定済み</span>
        </div>
        <p x-show="folderName" class="text-sm text-gray-700 truncate mb-3" x-text="folderName"></p>
        <p x-show="!folderName" class="text-sm text-gray-400 mb-3">未選択（明細アップロード時にも選べます）</p>
        <button @click="chooseFolder()"
                class="px-4 py-2 text-sm border border-gray-200 rounded-lg font-medium text-gray-600 hover:bg-gray-50"
                x-text="folderId ? 'フォルダを変更' : 'フォルダを選択'"></button>
      </div>

      <!-- 家族メンバー -->
      <div x-show="configured" class="bg-white rounded-xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <p class="text-sm font-medium">家族メンバー</p>
          <span x-show="membersLoading" class="text-xs text-gray-400">読み込み中...</span>
        </div>

        <!-- メンバー一覧 -->
        <div class="space-y-3 mb-4" x-show="!membersLoading">
          <p x-show="members.length === 0" class="text-sm text-gray-400">メンバーがいません</p>
          <template x-for="(m, idx) in members" :key="m.id || idx">
            <div class="flex items-center gap-2">
              <span class="text-sm flex-1 font-medium" x-text="m.display_name"></span>
              <div class="flex gap-1.5">
                <template x-for="c in colorOptions" :key="c.key">
                  <button @click="setMemberColor(idx, c.key)"
                          :class="[c.dot, m.color === c.key ? 'ring-2 ring-offset-1 ring-gray-500 scale-110' : 'opacity-70 hover:opacity-100']"
                          class="w-6 h-6 rounded-full transition-all"></button>
                </template>
              </div>
              <button @click="deleteMember(idx)"
                      class="text-xs text-gray-400 hover:text-red-500 ml-1 px-1">削除</button>
            </div>
          </template>
        </div>

        <!-- 追加フォーム -->
        <div class="flex items-center gap-2 pt-3 border-t border-gray-100">
          <input type="text" x-model="newMemberName"
                 @keydown.enter="addMember()"
                 placeholder="名前を入力"
                 class="flex-1 min-w-0 text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-300">
          <div class="flex gap-1.5 shrink-0">
            <template x-for="c in colorOptions" :key="c.key">
              <button @click="newMemberColor = c.key"
                      :class="[c.dot, newMemberColor === c.key ? 'ring-2 ring-offset-1 ring-gray-500 scale-110' : 'opacity-70 hover:opacity-100']"
                      class="w-6 h-6 rounded-full transition-all"></button>
            </template>
          </div>
          <button @click="addMember()"
                  :disabled="!newMemberName.trim()"
                  class="shrink-0 text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed">追加</button>
        </div>

        <p x-show="memberError" class="mt-2 text-xs text-red-500" x-text="memberError"></p>
      </div>

      <!-- 完了 -->
      <a x-show="configured" href="dashboard.html"
         class="block w-full py-3 bg-blue-600 text-white rounded-xl text-sm font-medium text-center hover:bg-blue-700">
        ダッシュボードへ
      </a>
      <p x-show="!configured" class="text-xs text-gray-400 text-center">
        スプレッドシートを選択すると次へ進めます
      </p>

    </div>
  </div>

  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
